<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>吹瓶異常快速查閱</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0a1628;
      --navy-mid: #112240;
      --navy-light: #1a3a5c;
      --accent: #e8a020;
      --accent-light: #f5bb4a;
      --accent-dim: rgba(232, 160, 32, 0.15);
      --white: #ffffff;
      --gray-100: #f0f2f5;
      --gray-200: #e2e6ec;
      --gray-400: #8a98ab;
      --gray-600: #4a5568;
      --danger: #e05252;
      --success: #38b28a;
      --card-shadow: 0 4px 20px rgba(0,0,0,0.08);
      --card-hover-shadow: 0 12px 40px rgba(0,0,0,0.15);
      --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
      background: var(--gray-100);
      color: var(--navy);
      min-height: 100vh;
    }

    /* ─── HEADER ─── */
    header {
      background: var(--navy);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.5rem 0.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .header-titles h1 {
      font-size: 1.35rem;
      font-weight: 900;
      color: var(--white);
      letter-spacing: 0.04em;
    }

    .header-titles h2 {
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--gray-400);
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    .header-badge {
      background: var(--accent);
      color: var(--navy);
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.25rem 0.7rem;
      border-radius: 99px;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    /* Search */
    .header-search {
      padding: 0.6rem 1.5rem;
    }

    .search-wrap {
      position: relative;
      max-width: 480px;
      margin: 0 auto;
    }

    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-400);
      font-size: 1rem;
      pointer-events: none;
    }

    #search-input {
      width: 100%;
      padding: 0.65rem 1rem 0.65rem 2.6rem;
      font-size: 0.9rem;
      font-family: inherit;
      border-radius: 999px;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.07);
      color: var(--white);
      outline: none;
      transition: border-color var(--transition), background var(--transition);
    }

    #search-input::placeholder { color: var(--gray-400); }
    #search-input:focus {
      border-color: var(--accent);
      background: rgba(255,255,255,0.11);
    }

    /* Filter Pills */
    .filter-scroll-wrap {
      overflow-x: auto;
      padding: 0.55rem 1rem 0.7rem;
      scrollbar-width: none;
    }
    .filter-scroll-wrap::-webkit-scrollbar { display: none; }

    #filters {
      display: flex;
      gap: 0.45rem;
      width: max-content;
    }

    .filter {
      padding: 0.38rem 0.9rem;
      font-size: 0.82rem;
      font-family: inherit;
      font-weight: 500;
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 99px;
      background: transparent;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      white-space: nowrap;
      transition: all var(--transition);
      letter-spacing: 0.02em;
    }

    .filter:hover {
      background: rgba(255,255,255,0.1);
      color: var(--white);
      border-color: rgba(255,255,255,0.3);
    }

    .filter.active {
      background: var(--accent);
      color: var(--navy);
      border-color: var(--accent);
      font-weight: 700;
    }

    /* Result count */
    .result-info {
      padding: 0.7rem 1.5rem 0.2rem;
      font-size: 0.78rem;
      color: var(--gray-600);
      letter-spacing: 0.02em;
    }

    /* ─── CARDS ─── */
    #card-container {
      padding: 0.8rem 1rem 3rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 0.8rem;
    }

    .card {
      background: var(--white);
      border-radius: 12px;
      padding: 0.7rem 0.6rem 0.8rem;
      cursor: pointer;
      text-align: center;
      box-shadow: var(--card-shadow);
      transition: transform var(--transition), box-shadow var(--transition);
      border: 1.5px solid transparent;
      animation: cardFadeIn 0.3s ease both;
      position: relative;
      overflow: hidden;
    }

    @keyframes cardFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
      transform: scaleX(0);
      transition: transform var(--transition);
      transform-origin: left;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--card-hover-shadow);
      border-color: var(--accent-light);
    }

    .card:hover::before { transform: scaleX(1); }

    .card img {
      width: 100%;
      height: 90px;
      object-fit: contain;
      border-radius: 6px;
      background: var(--gray-100);
      margin-bottom: 0.5rem;
    }

    .card-tag {
      display: inline-block;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 0.1rem 0.45rem;
      border-radius: 4px;
      margin-bottom: 0.3rem;
    }

    .card h3 {
      font-size: 0.88rem;
      font-weight: 700;
      line-height: 1.4;
      color: var(--navy);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Empty state */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--gray-400);
    }

    .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-state p { font-size: 0.95rem; }

    /* ─── MODAL ─── */
    #modal {
      position: fixed;
      inset: 0;
      background: rgba(5, 10, 20, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 9999;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    #modal.hidden { display: none !important; }

    .modal-content {
      background: var(--white);
      width: 100%;
      max-width: 600px;
      border-radius: 16px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
      animation: modalSlideUp 0.28s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes modalSlideUp {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-header {
      background: var(--navy);
      padding: 1.1rem 1.3rem;
      border-radius: 16px 16px 0 0;
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    #modal-title {
      font-size: 1.15rem;
      font-weight: 900;
      color: var(--white);
      letter-spacing: 0.04em;
    }

    #close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      color: var(--white);
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition);
      flex-shrink: 0;
      line-height: 1;
    }

    #close:hover { background: rgba(255,255,255,0.25); }

    .modal-img-wrap {
      padding: 1rem 1.3rem 0.5rem;
      background: var(--gray-100);
      border-bottom: 1px solid var(--gray-200);
    }

    #modal-img {
      width: 100%;
      max-height: 220px;
      object-fit: contain;
      border-radius: 8px;
      display: block;
    }

    .modal-body {
      padding: 0.8rem 1.3rem 1.5rem;
    }

    .modal-pair {
      margin-bottom: 0.9rem;
      border-radius: 10px;
      overflow: hidden;
      border: 1.5px solid var(--gray-200);
    }

    .modal-pair-header {
      background: var(--navy-mid);
      color: var(--white);
      font-weight: 700;
      font-size: 0.88rem;
      padding: 0.6rem 0.9rem;
      line-height: 1.5;
      display: flex;
      gap: 0.5rem;
      align-items: flex-start;
    }

    .cause-label {
      background: var(--accent);
      color: var(--navy);
      font-size: 0.72rem;
      font-weight: 900;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 1px;
      letter-spacing: 0.04em;
    }

    .modal-pair-solutions {
      list-style: none;
      padding: 0.5rem 0.9rem 0.6rem;
      margin: 0;
      background: #fafbfc;
    }

    .modal-pair-solutions li {
      font-size: 0.87rem;
      line-height: 1.65;
      color: var(--navy);
      padding: 0.3rem 0 0.3rem 1.2rem;
      position: relative;
      border-bottom: 1px solid var(--gray-100);
    }

    .modal-pair-solutions li:last-child { border-bottom: none; }

    .modal-pair-solutions li::before {
      content: '▶';
      position: absolute;
      left: 0;
      font-size: 0.55rem;
      color: var(--accent);
      top: 0.42rem;
    }

    /* scrollbar */
    .modal-content::-webkit-scrollbar { width: 4px; }
    .modal-content::-webkit-scrollbar-track { background: transparent; }
    .modal-content::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 99px; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 600px) {
      .header-top { padding: 0.75rem 1rem 0.4rem; }
      .header-titles h1 { font-size: 1.1rem; }
      .header-search { padding: 0.5rem 1rem; }
      .filter-scroll-wrap { padding: 0.45rem 0.8rem 0.6rem; }

      #card-container {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 0.65rem;
        padding: 0.7rem 0.8rem 3rem;
      }

      .card img { height: 75px; }
      .card h3 { font-size: 0.82rem; }

      .modal-content { max-height: 88vh; border-radius: 14px; }
      #modal-title { font-size: 1rem; }
      #modal-img { max-height: 160px; }
      .modal-header { padding: 0.85rem 1rem; border-radius: 14px 14px 0 0; }
      .modal-body { padding: 0.7rem 1rem 1.3rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-titles">
      <h1>🔍 吹瓶異常快速查閱</h1>
      <h2>DEFECT QUICK REFERENCE SYSTEM</h2>
    </div>
    <span class="header-badge">2022 二版</span>
  </div>

  <div class="header-search">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="輸入關鍵字搜尋（名稱 / 原因 / 對策）">
    </div>
  </div>

  <div class="filter-scroll-wrap">
    <div id="filters">
     <button class="filter active" data-type="all">全部</button>
    <button class="filter" data-type="吹瓶">吹瓶</button>
    <button class="filter" data-type="入庫">入庫</button>
    <button class="filter" data-type="測漏">測漏</button>
    <button class="filter" data-type="套標">套標</button>
    <button class="filter" data-type="貼標">貼標</button>
    <button class="filter" data-type="堆疊">堆疊</button>
    </div>
  </div>
</header>

<div class="result-info" id="result-info"></div>
<main id="card-container"></main>

<!-- Modal -->
<div id="modal" class="hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button id="close" aria-label="關閉">&times;</button>
    </div>
    <div class="modal-img-wrap">
      <img id="modal-img" alt="">
    </div>
    <div class="modal-body">
      <div id="modal-pairs"></div>
    </div>
  </div>
</div>

<script>
const defects = [
    {
      name: "瓶身白化",
      type: "吹瓶",
      img: "images/瓶身白化.JPG",
      reason: [
        "A.瓶胚胚身霧化不良，造成PET瓶吹製拉伸時加重白化現象。",
        "B.OVEN加熱爐溫度過高，造成過度加熱產生霧化。"
      ],
      solution: [
        "A1.更換瓶胚批生產。",
        "B1.降低OVEN加熱爐燈管功率。",
        "B2.增加鼓風功率。"
      ]
    },{
        name: "瓶口撞傷",
        type: "吹瓶",
        img: "images/瓶口撞傷.JPG",
        reason: [
          "A.瓶胚入模時位置偏移，造成吹嘴撞傷瓶口端面。",
          "B.吹瓶氣缸作動異常。",
          "C.吹嘴電磁閥作動異常。",
          "D.吹嘴變形導致瓶口壁撞傷。"
        ],
        solution: [
          "A1.確認撞傷位置是否為連續性，若為連續時須檢查吹嘴位置，並重新調整瓶胚入模位置與吹嘴高度。",
          "B1.更換吹瓶汽缸新品。",
          "C1.更換吹嘴電磁閥新品。",
          "D1.更換新吹嘴與套件。"
        ]
      },{
        name: "瓶頸漲大",
        type: "吹瓶",
        img: "images/瓶頸漲大.JPG",
        reason: [
          "A.瓶胚支撐環處結晶不完全，造成高壓吹製時瓶頸漲大。",
          "B.瓶口 / 支撐環處受熱，造成吹瓶時瓶頸漲大。",
          "C.冷卻塊失效，造成冷卻不良。(冰水管路阻塞)。"
        ],
        solution: [
          "A1.更換新瓶胚批生產。",
          "B1.拆模清潔保養。",
          "B2.降低瓶口溫度。",
          "B3.重新校正冷卻塊位置。(上下及前後間距至少2mm)。",
          "C1.確認冷卻水溫度。",
          "C2.拆模清潔水路 / 更換冷卻水管新品。"
        ]
      },{
        name: "高度過高",
        type: "吹瓶",
        img: "images/高度過高.JPG",
        reason: [
          "A.模具溫度過低。",
          "B.模身高度墊片過高。",
          "C.延伸桿上升角度過大，造成排氣過慢。",
          "D.冷卻時間太長。"
        ],
        solution: [
          "A1.提高模具溫度。",
          "B1.調降模身高度墊片。",
          "C1.確認延伸桿上升角度，並調整排氣時間使其提早排氣，降低過度吹漲。",
          "D1.縮短冷卻時間。"
        ]
      },{
        name: "容量過高",
        type: ["吹瓶","入庫"],
        img: "images/容量過高.JPG",
        reason: [
          "A.模具溫度過低於PET吹製程成型時產生容積過大，造成容量過高。",
          "B.視窗(Panel)墊片過薄，造成吹製成型時容量過高。",
          "C.冷卻時間過長，造成吹瓶脹大容量過高。",
          "D.OVEN加熱爐溫度過高，造成過度加熱產生霧化。",
          "E.預留空瓶因儲放時間造成瓶縮使容量不足。(入庫)"
        ],
        solution: [
          "A1.提高模具溫度。",
          "B1.調整視窗(Panel)墊片之厚薄差異。",
          "C1.降低延伸桿上升角度，並縮短冷卻時間。",
          "D1.降低OVEN加熱爐燈管功率。",
          "D2.增加鼓風功率。",
          "E1.空瓶進行儲存測試，確認瓶縮比率，再跟業務將檢討修改新鮮瓶容量規範。"
        ]
      },{
        name: "容量過低",
        type: "吹瓶",
        img: "images/容量過低.JPG",
        reason: [
          "A.瓶胚置放時間過久影響含水率，造成 PET吹製不穩定。",
          "B.模具溫度過高於PET吹製程成型時產生容積過小，造成容量過低。",
          "C.視窗(Panel)墊片過厚，造成吹製成型時容量過低。",
          "D.冷卻時間過短，造成吹瓶容積小導致容量過低。",
          "E.OVEN溫度過高，導致瓶縮容量不足。"
        ],
        solution: [
          "A1.更換新瓶胚批生產。",
          "B1.降低模具溫度。",
          "C1.調整視窗(Panel)墊片之厚薄差異。",
          "D1.提高延伸桿上升角度，並延長冷卻時間。",
          "E1.調整降低OVEN溫度。"
        ]
      },{
        name: "中心點偏移",
        type: "吹瓶",
        img: "images/中心點偏移.JPG",
        reason: [
          "A.瓶胚塑料分佈不均使厚薄差異過大，造成吹瓶中心點偏移。",
          "B.瓶胚底部加熱功率過大。",
          "C.預吹壓力過大，造成預吹成型時已偏移。",
          "D.預吹角度過早，造成預吹瓶塑料分佈不均。",
          "E.延伸桿歪斜，導致PET瓶成型時偏移吹漲。",
          "F.延伸桿與底模間隙位置調整不當。",
          "G.延伸桿氣缸作動不良，造成吹瓶拉伸過度產生中心偏移。",
          "H.吹瓶機OVEN自轉鏈條鬆脫。"
        ],
        solution: [
          "A1.PET吹製成型時，重新調整吹瓶瓶身塑料分佈位置 / 更換新瓶胚批生產。",
          "B1.降低OVEN加熱爐底部區燈管功率。",
          "C1.降低預吹壓力。",
          "D1.延後預吹角度。",
          "E1.進行延伸桿位置矯正 / 更換延伸桿。",
          "F1.重新調整校正底模間隙。",
          "G1.重新調整延伸桿氣缸 / 更換電磁閥新品。",
          "G2.檢查延伸桿導軌間隙。(0.15~0.25m/m)。",
          "H1.鏈條固鎖。"
        ]
      },{
        name: "凸底",
        type: "吹瓶",
        img: "images/凸底.JPG",
        reason: [
          "A.底模模具溫度過高，造成吹製時PET瓶底部凸出。",
          "B.底模模具受損，於PET瓶吹漲時造成底部塑料黏模。",
          "C.PUSH UP電磁閥作動不良。"
        ],
        solution: [
          "A1.降低底模模具溫度。",
          "B1.更換底模模具。",
          "C1.更換PUSH UP電磁閥。"
        ]
      },{
        name: "瓶底破洞",
        type: "吹瓶",
        img: "images/瓶底破洞.JPG",
        reason: [
          "A.瓶胚注口針孔，造成吹瓶破洞。",
          "B.底模 / 模具受損 (銳角)，於PET瓶吹漲時造成底部塑料黏模破瓶。。"
        ],
        solution: [
          "A1.更換瓶胚批生產。",
          "B1.進行底模 / 模具研磨拋光處理。",
          "B2.更換模具 / 底模新品。"
        ]
      },{
        name: "瓶底皺褶",
        type: "吹瓶",
        img: "images/瓶底皺褶.JPG",
        reason: [

const container = document.getElementById("card-container");
const modal = document.getElementById("modal");
const modalTitle = document.getElementById("modal-title");
const modalImg = document.getElementById("modal-img");
const closeBtn = document.getElementById("close");
const modalPairs = document.getElementById("modal-pairs");
const resultInfo = document.getElementById("result-info");

let currentType = "all";
let keyword = "";

function getTypeLabel(type) {
  if (Array.isArray(type)) return type[0];
  return type;
}

function renderCards(list) {
  container.innerHTML = "";
  resultInfo.textContent = `共 ${list.length} 項異常`;

  if (list.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🔎</div><p>找不到符合條件的異常項目</p></div>`;
    return;
  }

  list.forEach((d, i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = `${Math.min(i * 0.03, 0.5)}s`;
    card.innerHTML = `
      <img src="${d.img}" alt="${d.name}" loading="lazy" onerror="this.style.display='none'">
      <div class="card-tag">${getTypeLabel(d.type)}</div>
      <h3>${d.name}</h3>
    `;
    card.onclick = () => openModal(d);
    container.appendChild(card);
  });
}

function openModal(d) {
  modalTitle.innerText = d.name;
  modalImg.src = d.img;
  modalImg.alt = d.name;

  const solutionMap = {};
  d.solution.forEach(text => {
    const m = text.match(/^([A-Za-z])/);
    if (!m) return;
    const key = m[1];
    if (!solutionMap[key]) solutionMap[key] = [];
    solutionMap[key].push(text);
  });

  let html = "";
  d.reason.forEach(r => {
    const m = r.match(/^([A-Za-z])/);
    const key = m ? m[1] : "";
    const sols = solutionMap[key] || [];
    html += `
      <div class="modal-pair">
        <div class="modal-pair-header">
          <span class="cause-label">${key || '?'}</span>
          <span>${r.replace(/^[A-Za-z]\./, '').trim()}</span>
        </div>
        ${sols.length ? `<ul class="modal-pair-solutions">${sols.map(s => `<li>${s}</li>`).join("")}</ul>` : ""}
      </div>
    `;
  });

  modalPairs.innerHTML = html;
  modal.classList.remove("hidden");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  modal.classList.add("hidden");
  document.body.style.overflow = "";
}

modal.addEventListener("click", e => { if (e.target === modal) closeModal(); });
closeBtn.addEventListener("click", closeModal);
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

function applyFilter() {
  const kw = keyword.trim().toLowerCase();
  const list = defects.filter(d => {
    let matchType = currentType === "all" ||
      (Array.isArray(d.type) ? d.type.includes(currentType) : d.type === currentType);
    const text = (d.name || "") + " " +
      (Array.isArray(d.reason) ? d.reason.join(" ") : "") + " " +
      (Array.isArray(d.solution) ? d.solution.join(" ") : "");
    const matchKeyword = !kw || text.toLowerCase().includes(kw);
    return matchType && matchKeyword;
  });
  renderCards(list);
}

document.querySelectorAll(".filter").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".filter").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentType = btn.dataset.type;
    applyFilter();
  };
});

const searchInput = document.getElementById("search-input");
if (searchInput) {
  searchInput.addEventListener("input", () => {
    keyword = searchInput.value;
    applyFilter();
  });
}

document.addEventListener("DOMContentLoaded", () => { applyFilter(); });
applyFilter();
