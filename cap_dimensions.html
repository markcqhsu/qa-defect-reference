<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>塑蓋尺寸查詢</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a1628;
    --navy-mid: #112240;
    --navy-light: #1a3a5c;
    --accent: #e8a020;
    --accent-light: #f5bb4a;
    --accent-dim: rgba(232,160,32,0.15);
    --white: #ffffff;
    --gray-100: #f0f2f5;
    --gray-200: #e2e6ec;
    --gray-400: #8a98ab;
    --gray-600: #4a5568;
    --card-shadow: 0 4px 20px rgba(0,0,0,0.08);
    --card-hover-shadow: 0 12px 40px rgba(0,0,0,0.15);
    --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC','Microsoft JhengHei',sans-serif; background: var(--gray-100); color: var(--navy); min-height: 100vh; }

  /* ─── HEADER ─── */
  header { background: var(--navy); position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.9rem 1.5rem 0.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    gap: 1rem;
  }
  .header-titles h1 { font-size: 1.35rem; font-weight: 900; color: var(--white); letter-spacing: 0.04em; }
  .header-titles h1 a { color: inherit; text-decoration: none; }
  .header-titles h2 { font-size: 0.72rem; font-weight: 400; color: var(--gray-400); letter-spacing: 0.06em; margin-top: 2px; }
  .header-badge {
    background: var(--accent); color: var(--navy);
    font-size: 0.7rem; font-weight: 700;
    padding: 0.25rem 0.7rem; border-radius: 99px;
    letter-spacing: 0.05em; white-space: nowrap;
  }

  /* ─── SEARCH ─── */
  .header-search { padding: 0.6rem 1.5rem; }
  .search-wrap { position: relative; max-width: 480px; margin: 0 auto; }
  .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--gray-400); font-size: 1rem; pointer-events: none; }
  #search-input {
    width: 100%; padding: 0.65rem 1rem 0.65rem 2.6rem;
    font-size: 0.9rem; font-family: inherit;
    border-radius: 999px; border: 1.5px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.07); color: var(--white); outline: none;
    transition: border-color var(--transition), background var(--transition);
  }
  #search-input::placeholder { color: var(--gray-400); }
  #search-input:focus { border-color: var(--accent); background: rgba(255,255,255,0.11); }

  /* ─── FILTER PILLS ─── */
  .filter-scroll-wrap { overflow-x: auto; padding: 0.55rem 1rem 0.7rem; scrollbar-width: none; }
  .filter-scroll-wrap::-webkit-scrollbar { display: none; }
  #filters { display: flex; gap: 0.45rem; width: max-content; }
  .filter {
    padding: 0.38rem 0.9rem; font-size: 0.82rem; font-family: inherit; font-weight: 500;
    border: 1.5px solid rgba(255,255,255,0.15); border-radius: 99px;
    background: transparent; color: rgba(255,255,255,0.7);
    cursor: pointer; white-space: nowrap; transition: all var(--transition); letter-spacing: 0.02em;
  }
  .filter:hover { background: rgba(255,255,255,0.1); color: var(--white); border-color: rgba(255,255,255,0.3); }
  .filter.active { background: var(--accent); color: var(--navy); border-color: var(--accent); font-weight: 700; }

  /* ─── RESULT INFO ─── */
  .result-info { padding: 0.7rem 1.5rem 0.2rem; font-size: 0.78rem; color: var(--gray-600); letter-spacing: 0.02em; }

  /* ─── CARD GRID ─── */
  #card-container {
    padding: 0.8rem 1rem 3rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 0.9rem;
  }
  .card {
    background: var(--white); border-radius: 12px; padding: 1rem 1rem 0.9rem;
    cursor: pointer; box-shadow: var(--card-shadow);
    transition: transform var(--transition), box-shadow var(--transition);
    border: 1.5px solid transparent; position: relative; overflow: hidden;
    animation: cardFadeIn 0.3s ease both;
  }
  @keyframes cardFadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .card::before {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    background: var(--accent); transform: scaleX(0); transition: transform var(--transition); transform-origin: left;
  }
  .card:hover { transform: translateY(-4px); box-shadow: var(--card-hover-shadow); border-color: var(--accent-light); }
  .card:hover::before { transform: scaleX(1); }

  .card-series {
    display: inline-block; font-size: 0.62rem; font-weight: 700; letter-spacing: 0.06em;
    color: var(--accent); background: var(--accent-dim); padding: 0.1rem 0.45rem; border-radius: 4px; margin-bottom: 0.4rem;
  }
  .card h3 { font-size: 0.9rem; font-weight: 700; line-height: 1.4; color: var(--navy); margin-bottom: 0.6rem; }
  .card-preview { display: flex; flex-direction: column; gap: 0.28rem; }
  .preview-row { display: flex; justify-content: space-between; gap: 0.4rem; font-size: 0.74rem; }
  .preview-key { color: var(--gray-400); }
  .preview-val { font-weight: 600; color: var(--gray-600); }

  /* ─── EMPTY ─── */
  .empty-state { grid-column: 1/-1; text-align: center; padding: 4rem 1rem; color: var(--gray-400); }
  .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty-state p { font-size: 0.95rem; }

  /* ─── MODAL ─── */
  #modal {
    position: fixed; inset: 0; background: rgba(5,10,20,0.75);
    display: flex; align-items: center; justify-content: center;
    padding: 1rem; z-index: 9999;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }
  #modal.hidden { display: none !important; }
  .modal-content {
    background: var(--white); width: 100%; max-width: 560px;
    border-radius: 16px; max-height: 90vh; overflow-y: auto; position: relative;
    box-shadow: 0 24px 80px rgba(0,0,0,0.35);
    animation: modalSlideUp 0.28s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes modalSlideUp { from { opacity:0; transform:translateY(30px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }
  .modal-header {
    background: var(--navy); padding: 1.1rem 1.3rem;
    border-radius: 16px 16px 0 0; position: sticky; top: 0; z-index: 1;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem;
  }
  #modal-title { font-size: 1.1rem; font-weight: 900; color: var(--white); letter-spacing: 0.04em; }
  #modal-series { font-size: 0.7rem; font-weight: 700; color: var(--navy); background: var(--accent); padding: 0.15rem 0.5rem; border-radius: 4px; margin-top: 0.3rem; display: inline-block; }
  #close {
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(255,255,255,0.12); color: var(--white);
    border: none; cursor: pointer; font-size: 1.2rem;
    display: flex; align-items: center; justify-content: center;
    transition: background var(--transition); flex-shrink: 0; line-height: 1;
  }
  #close:hover { background: rgba(255,255,255,0.25); }
  .modal-body { padding: 0.3rem 0 1rem; }
  .spec-row-modal {
    display: flex; justify-content: space-between; gap: 1rem;
    padding: 0.65rem 1.3rem; border-bottom: 1px solid var(--gray-100);
    font-size: 0.87rem;
  }
  .spec-row-modal:last-child { border-bottom: none; }
  .spec-row-modal:hover { background: #f9fafb; }
  .spec-k { color: var(--gray-400); flex-shrink: 0; }
  .spec-v { font-weight: 700; color: var(--navy); text-align: right; }
  .modal-notice {
    margin: 0 1.3rem 1rem; padding: 0.7rem 0.9rem;
    background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px;
    font-size: 0.75rem; color: #92400e; display: flex; gap: 0.4rem;
  }
  .modal-content::-webkit-scrollbar { width: 4px; }
  .modal-content::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 99px; }

  /* ─── VERSION LOG ─── */
  .version-btn {
    background: none; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.6);
    font-size: 0.72rem; padding: 0.25rem 0.6rem; border-radius: 6px; cursor: pointer;
    font-family: inherit; transition: all var(--transition); white-space: nowrap;
  }
  .version-btn:hover { border-color: var(--accent); color: var(--accent); }
  #version-panel {
    background: var(--navy-mid); border-top: 1px solid rgba(255,255,255,0.06);
    padding: 0; max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s ease;
  }
  #version-panel.open { max-height: 300px; padding: 0.8rem 1.5rem; overflow-y: auto; }
  .v-item { display: flex; gap: 1rem; padding: 0.45rem 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 0.78rem; }
  .v-item:last-child { border-bottom: none; }
  .v-date { color: var(--accent); font-weight: 700; white-space: nowrap; min-width: 88px; }
  .v-content { color: rgba(255,255,255,0.75); flex: 1; }
  .v-author { color: var(--gray-400); white-space: nowrap; }

  @media (max-width: 600px) {
    .header-top { padding: 0.75rem 1rem 0.4rem; }
    .header-titles h1 { font-size: 1.1rem; }
    .header-search { padding: 0.5rem 1rem; }
    .filter-scroll-wrap { padding: 0.45rem 0.8rem 0.6rem; }
    #card-container { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.7rem; padding: 0.7rem 0.8rem 3rem; }
  }
</style>
</head>

<div id="modal" class="hidden">

// Flatten
const allModels = [];
for (const [series, models] of Object.entries(productsData)) {
  for (const [name, specs] of Object.entries(models)) {
    allModels.push({ series, name, specs });
  }
}
document.getElementById('total-badge').textContent = allModels.length + ' 型號';

// Build version log
document.getElementById('version-list').innerHTML = versionHistory.map(h =>
  `<div class="v-item"><span class="v-date">${h.date}</span><span class="v-content">${h.content}</span><span class="v-author">${h.author}</span></div>`
).join('');

// Build filter pills
const filtersEl = document.getElementById('filters');
const makeFilter = (label, series) => {
  const btn = document.createElement('button');
  btn.className = 'filter' + (series === 'all' ? ' active' : '');
  btn.textContent = label;
  btn.dataset.series = series;
  btn.onclick = () => setFilter(series);
  filtersEl.appendChild(btn);
};
makeFilter(`全部 (${allModels.length})`, 'all');
for (const s of Object.keys(productsData)) {
  makeFilter(`${s} (${Object.keys(productsData[s]).length})`, s);
}

let activeSeries = 'all', searchTerm = '';

function setFilter(s) {
  activeSeries = s;
  document.querySelectorAll('.filter').forEach(b => b.classList.toggle('active', b.dataset.series === s));
  render();
}

document.getElementById('search-input').addEventListener('input', e => {
  searchTerm = e.target.value.trim().toLowerCase();
  render();
});

const PREVIEW_KEYS = ['外徑(mm)', '高度(mm)', '厚度(mm)'];

function render() {
  const container = document.getElementById('card-container');
  const filtered = allModels.filter(m =>
    (activeSeries === 'all' || m.series === activeSeries) &&
    (!searchTerm || m.name.toLowerCase().includes(searchTerm) || m.series.toLowerCase().includes(searchTerm))
  );
  document.getElementById('result-info').textContent = `顯示 ${filtered.length} / ${allModels.length} 筆`;
  if (!filtered.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><p>找不到「${searchTerm}」，請嘗試其他關鍵字</p></div>`;
    return;
  }
  container.innerHTML = filtered.map(m => {
    const preview = PREVIEW_KEYS.filter(k => m.specs[k])
      .map(k => `<div class="preview-row"><span class="preview-key">${k}</span><span class="preview-val">${m.specs[k]}</span></div>`).join('');
    return `<div class="card" onclick="openModal('${m.series}','${m.name.replace(/'/g,"\\'")}')">
      <span class="card-series">${m.series}</span>
      <h3>${m.name}</h3>
      <div class="card-preview">${preview}</div>
    </div>`;
  }).join('');
}

function openModal(series, name) {
  const specs = productsData[series][name];
  document.getElementById('modal-title').textContent = name;
  document.getElementById('modal-series').textContent = series + ' 系列';
  document.getElementById('modal-body').innerHTML =
    Object.entries(specs).map(([k, v]) =>
      `<div class="spec-row-modal"><span class="spec-k">${k}</span><span class="spec-v">${v}</span></div>`
    ).join('') +
    `<div class="modal-notice">⚠️ 數據僅供參考，最新標準請查閱正式規格單</div>`;
  document.getElementById('modal').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  document.body.style.overflow = '';
}

document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function toggleVersion() {
  document.getElementById('version-panel').classList.toggle('open');
}

render();
</script>
