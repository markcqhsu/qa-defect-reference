<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>塑蓋尺寸查詢</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4f8;
  --white: #ffffff;
  --navy: #0a1628;
  --accent: #3b6fd4;
  --accent-light: #ebf0fb;
  --text: #1e293b;
  --muted: #64748b;
  --border: #e2e8f0;
  --tag-bg: #f1f5f9;
  --hover: #f8fafc;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.16);
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── Header ── */
header {
  background: var(--navy);
  padding: 1rem 1.5rem;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.header-left { display: flex; align-items: center; gap: 0.8rem; }
.header-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.header-icon svg { width: 20px; height: 20px; fill: white; }
header h1 { font-size: 1.1rem; font-weight: 700; color: white; }
.header-meta { font-size: 0.72rem; color: #94a3b8; }
.home-btn { color: #94a3b8; text-decoration: none; font-size: 0.8rem; padding: 0.4rem 0.8rem; border: 1px solid #334155; border-radius: 6px; transition: all 0.2s; }
.home-btn:hover { color: white; border-color: #64748b; }

/* ── Controls ── */
.controls { background: white; border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; flex-direction: column; gap: 0.8rem; }
.search-wrap { position: relative; max-width: 480px; }
.search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; stroke: var(--muted); fill: none; }
#searchInput {
  width: 100%; padding: 0.6rem 0.8rem 0.6rem 2.4rem;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 0.9rem; color: var(--text); outline: none;
  font-family: inherit; transition: border-color 0.2s;
}
#searchInput:focus { border-color: var(--accent); }
#searchInput::placeholder { color: #94a3b8; }

.filter-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.filter-btn {
  padding: 0.35rem 0.9rem; border-radius: 99px;
  border: 1.5px solid var(--border); background: white;
  font-size: 0.8rem; font-weight: 500; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  font-family: inherit;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

/* ── Grid ── */
main { padding: 1.25rem 1.5rem 3rem; max-width: 1200px; margin: 0 auto; }
.result-info { font-size: 0.78rem; color: var(--muted); margin-bottom: 1rem; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 1rem; }

/* ── Card ── */
.card {
  background: white; border-radius: var(--radius);
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow);
  cursor: pointer; transition: all 0.18s;
  overflow: hidden;
}
.card:hover { border-color: var(--accent); box-shadow: 0 4px 20px rgba(59,111,212,0.15); transform: translateY(-2px); }
.card-head {
  padding: 1rem 1rem 0.7rem;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem;
}
.card-name { font-size: 0.95rem; font-weight: 700; color: var(--text); line-height: 1.3; }
.series-tag {
  flex-shrink: 0; font-size: 0.68rem; font-weight: 700;
  padding: 0.2rem 0.5rem; border-radius: 99px;
  background: var(--accent-light); color: var(--accent);
}
.card-specs { padding: 0.7rem 1rem 0.9rem; display: flex; flex-direction: column; gap: 0.35rem; }
.spec-row { display: flex; justify-content: space-between; gap: 0.5rem; }
.spec-key { font-size: 0.72rem; color: var(--muted); white-space: nowrap; }
.spec-val { font-size: 0.78rem; font-weight: 600; color: var(--text); text-align: right; }
.card-footer-btn {
  display: flex; align-items: center; justify-content: center; gap: 0.4rem;
  padding: 0.55rem; background: var(--hover);
  font-size: 0.78rem; color: var(--accent); font-weight: 600;
  border-top: 1px solid var(--border);
}
.card-footer-btn svg { width: 14px; height: 14px; stroke: var(--accent); fill: none; }

.no-result { text-align: center; padding: 4rem 1rem; color: var(--muted); }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 200; display: flex; align-items: center; justify-content: center;
  padding: 1rem; opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: white; border-radius: 16px; width: 100%; max-width: 560px;
  max-height: 88vh; overflow: hidden; display: flex; flex-direction: column;
  box-shadow: var(--shadow-lg);
  transform: translateY(20px); transition: transform 0.2s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-header {
  padding: 1.2rem 1.4rem; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: flex-start;
}
.modal-title { font-size: 1.1rem; font-weight: 700; color: var(--text); }
.modal-sub { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; }
.modal-close {
  width: 30px; height: 30px; border-radius: 50%;
  border: none; background: var(--tag-bg); cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.modal-close svg { width: 16px; height: 16px; stroke: var(--muted); fill: none; }
.modal-close:hover { background: #e2e8f0; }
.modal-body { overflow-y: auto; flex: 1; }
.spec-table { width: 100%; border-collapse: collapse; }
.spec-table tr { border-bottom: 1px solid var(--border); }
.spec-table tr:last-child { border-bottom: none; }
.spec-table tr:hover { background: var(--hover); }
.spec-table td { padding: 0.7rem 1.4rem; font-size: 0.88rem; }
.spec-table td:first-child { color: var(--muted); width: 45%; }
.spec-table td:last-child { font-weight: 600; color: var(--text); }
.modal-footer {
  padding: 0.8rem 1.4rem; border-top: 1px solid var(--border);
  background: #fffbeb; font-size: 0.75rem; color: #92400e;
  display: flex; gap: 0.5rem;
}
.modal-footer svg { width: 16px; height: 16px; stroke: #d97706; fill: none; flex-shrink: 0; }

/* ── Version log ── */
#versionPanel {
  display: none; background: white; border-radius: var(--radius);
  border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 1.5rem;
}
#versionPanel.open { display: block; }
.version-toggle { font-size: 0.78rem; color: var(--muted); background: none; border: 1px solid var(--border); border-radius: 6px; padding: 0.3rem 0.7rem; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.version-toggle:hover { color: var(--accent); border-color: var(--accent); }
.v-item { padding: 0.6rem 0; border-bottom: 1px solid var(--border); display: flex; gap: 1rem; font-size: 0.82rem; }
.v-item:last-child { border-bottom: none; }
.v-date { color: var(--accent); font-weight: 700; white-space: nowrap; min-width: 90px; }
.v-content { color: var(--text); flex: 1; }
.v-author { color: var(--muted); white-space: nowrap; }

@media (max-width: 640px) {
  header { padding: 0.8rem 1rem; }
  .controls { padding: 0.8rem 1rem; }
  main { padding: 1rem 1rem 3rem; }
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>

// Build flat list
const allModels = [];
for (const [series, models] of Object.entries(productsData)) {
  for (const [name, specs] of Object.entries(models)) {
    allModels.push({ series, name, specs });
  }
}

let activeSeries = 'all';
let searchTerm = '';

// Build filter buttons
const filterRow = document.getElementById('filterRow');
const allBtn = document.createElement('button');
allBtn.className = 'filter-btn active';
allBtn.textContent = `全部 (${allModels.length})`;
allBtn.onclick = () => setFilter('all');
allBtn.dataset.series = 'all';
filterRow.appendChild(allBtn);

for (const series of Object.keys(productsData)) {
  const count = Object.keys(productsData[series]).length;
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.textContent = `${series} (${count})`;
  btn.dataset.series = series;
  btn.onclick = () => setFilter(series);
  filterRow.appendChild(btn);
}

function setFilter(series) {
  activeSeries = series;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.series === series));
  render();
}

document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value.trim().toLowerCase();
  render();
});

function getPreviewSpecs(specs) {
  const keys = ['外徑(mm)', '高度(mm)', '厚度(mm)', '重量(g)'];
  return keys.filter(k => specs[k]).map(k => ({ k, v: specs[k] })).slice(0, 3);
}

function render() {
  const grid = document.getElementById('cardGrid');
  const noResult = document.getElementById('noResult');
  const resultInfo = document.getElementById('resultInfo');

  const filtered = allModels.filter(m => {
    const matchSeries = activeSeries === 'all' || m.series === activeSeries;
    const matchSearch = !searchTerm || m.name.toLowerCase().includes(searchTerm) || m.series.toLowerCase().includes(searchTerm);
    return matchSeries && matchSearch;
  });

  resultInfo.textContent = `顯示 ${filtered.length} / ${allModels.length} 筆`;

  if (filtered.length === 0) {
    grid.innerHTML = '';
    noResult.style.display = 'block';
    return;
  }
  noResult.style.display = 'none';

  grid.innerHTML = filtered.map(m => {
    const preview = getPreviewSpecs(m.specs);
    const previewHTML = preview.map(({k, v}) =>
      `<div class="spec-row"><span class="spec-key">${k}</span><span class="spec-val">${v.length > 14 ? v.slice(0,14)+'…' : v}</span></div>`
    ).join('');
    return `
      <div class="card" onclick="openModal('${m.series}','${m.name.replace(/'/g,"\\'")}')">
        <div class="card-head">
          <div class="card-name">${m.name}</div>
          <div class="series-tag">${m.series}</div>
        </div>
        <div class="card-specs">${previewHTML}</div>
        <div class="card-footer-btn">
          查看完整規格
          <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>`;
  }).join('');
}

function openModal(series, name) {
  const specs = productsData[series][name];
  document.getElementById('modalTitle').textContent = name;
  document.getElementById('modalSub').textContent = `系列：${series}`;
  const table = document.getElementById('modalTable');
  table.innerHTML = Object.entries(specs).map(([k, v]) =>
    `<tr><td>${k}</td><td>${v}</td></tr>`
  ).join('');
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

// Version log
function toggleVersion() {
  const panel = document.getElementById('versionPanel');
  if (!panel.classList.contains('open')) {
    const list = document.getElementById('versionList');
    list.innerHTML = versionHistory.map(h =>
      `<div class="v-item"><span class="v-date">${h.date}</span><span class="v-content">${h.content}</span><span class="v-author">${h.author}</span></div>`
    ).join('');
  }
  panel.classList.toggle('open');
}

render();
</script>
