<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>瓶胚異常快速查閱</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0a1628;
      --navy-mid: #112240;
      --navy-light: #1a3a5c;
      --accent: #e8a020;
      --accent-light: #f5bb4a;
      --accent-dim: rgba(232, 160, 32, 0.15);
      --white: #ffffff;
      --gray-100: #f0f2f5;
      --gray-200: #e2e6ec;
      --gray-400: #8a98ab;
      --gray-600: #4a5568;
      --danger: #e05252;
      --success: #38b28a;
      --card-shadow: 0 4px 20px rgba(0,0,0,0.08);
      --card-hover-shadow: 0 12px 40px rgba(0,0,0,0.15);
      --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
      background: var(--gray-100);
      color: var(--navy);
      min-height: 100vh;
    }

    /* ─── HEADER ─── */
    header {
      background: var(--navy);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.5rem 0.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .header-titles h1 {
      font-size: 1.35rem;
      font-weight: 900;
      color: var(--white);
      letter-spacing: 0.04em;
    }

    .header-titles h2 {
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--gray-400);
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    .header-badge {
      background: var(--accent);
      color: var(--navy);
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.25rem 0.7rem;
      border-radius: 99px;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    /* Search */
    .header-search {
      padding: 0.6rem 1.5rem;
    }

    .search-wrap {
      position: relative;
      max-width: 480px;
      margin: 0 auto;
    }

    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-400);
      font-size: 1rem;
      pointer-events: none;
    }

    #search-input {
      width: 100%;
      padding: 0.65rem 1rem 0.65rem 2.6rem;
      font-size: 0.9rem;
      font-family: inherit;
      border-radius: 999px;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.07);
      color: var(--white);
      outline: none;
      transition: border-color var(--transition), background var(--transition);
    }

    #search-input::placeholder { color: var(--gray-400); }
    #search-input:focus {
      border-color: var(--accent);
      background: rgba(255,255,255,0.11);
    }

    /* Filter Pills */
    .filter-scroll-wrap {
      overflow-x: auto;
      padding: 0.55rem 1rem 0.7rem;
      scrollbar-width: none;
    }
    .filter-scroll-wrap::-webkit-scrollbar { display: none; }

    #filters {
      display: flex;
      gap: 0.45rem;
      width: max-content;
    }

    .filter {
      padding: 0.38rem 0.9rem;
      font-size: 0.82rem;
      font-family: inherit;
      font-weight: 500;
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 99px;
      background: transparent;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      white-space: nowrap;
      transition: all var(--transition);
      letter-spacing: 0.02em;
    }

    .filter:hover {
      background: rgba(255,255,255,0.1);
      color: var(--white);
      border-color: rgba(255,255,255,0.3);
    }

    .filter.active {
      background: var(--accent);
      color: var(--navy);
      border-color: var(--accent);
      font-weight: 700;
    }

    /* Result count */
    .result-info {
      padding: 0.7rem 1.5rem 0.2rem;
      font-size: 0.78rem;
      color: var(--gray-600);
      letter-spacing: 0.02em;
    }

    /* ─── CARDS ─── */
    #card-container {
      padding: 0.8rem 1rem 3rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 0.8rem;
    }

    .card {
      background: var(--white);
      border-radius: 12px;
      padding: 0.7rem 0.6rem 0.8rem;
      cursor: pointer;
      text-align: center;
      box-shadow: var(--card-shadow);
      transition: transform var(--transition), box-shadow var(--transition);
      border: 1.5px solid transparent;
      animation: cardFadeIn 0.3s ease both;
      position: relative;
      overflow: hidden;
    }

    @keyframes cardFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
      transform: scaleX(0);
      transition: transform var(--transition);
      transform-origin: left;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--card-hover-shadow);
      border-color: var(--accent-light);
    }

    .card:hover::before { transform: scaleX(1); }

    .card img {
      width: 100%;
      height: 90px;
      object-fit: contain;
      border-radius: 6px;
      background: var(--gray-100);
      margin-bottom: 0.5rem;
    }

    .card-tag {
      display: inline-block;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 0.1rem 0.45rem;
      border-radius: 4px;
      margin-bottom: 0.3rem;
    }

    .card h3 {
      font-size: 0.88rem;
      font-weight: 700;
      line-height: 1.4;
      color: var(--navy);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Empty state */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--gray-400);
    }

    .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-state p { font-size: 0.95rem; }

    /* ─── MODAL ─── */
    #modal {
      position: fixed;
      inset: 0;
      background: rgba(5, 10, 20, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 9999;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    #modal.hidden { display: none !important; }

    .modal-content {
      background: var(--white);
      width: 100%;
      max-width: 600px;
      border-radius: 16px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
      animation: modalSlideUp 0.28s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes modalSlideUp {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-header {
      background: var(--navy);
      padding: 1.1rem 1.3rem;
      border-radius: 16px 16px 0 0;
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    #modal-title {
      font-size: 1.15rem;
      font-weight: 900;
      color: var(--white);
      letter-spacing: 0.04em;
    }

    #close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      color: var(--white);
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition);
      flex-shrink: 0;
      line-height: 1;
    }

    #close:hover { background: rgba(255,255,255,0.25); }

    .modal-img-wrap {
      padding: 1rem 1.3rem 0.5rem;
      background: var(--gray-100);
      border-bottom: 1px solid var(--gray-200);
    }

    #modal-img {
      width: 100%;
      max-height: 220px;
      object-fit: contain;
      border-radius: 8px;
      display: block;
    }

    .modal-body {
      padding: 0.8rem 1.3rem 1.5rem;
    }

    .modal-pair {
      margin-bottom: 0.9rem;
      border-radius: 10px;
      overflow: hidden;
      border: 1.5px solid var(--gray-200);
    }

    .modal-pair-header {
      background: var(--navy-mid);
      color: var(--white);
      font-weight: 700;
      font-size: 0.88rem;
      padding: 0.6rem 0.9rem;
      line-height: 1.5;
      display: flex;
      gap: 0.5rem;
      align-items: flex-start;
    }

    .cause-label {
      background: var(--accent);
      color: var(--navy);
      font-size: 0.72rem;
      font-weight: 900;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 1px;
      letter-spacing: 0.04em;
    }

    .modal-pair-solutions {
      list-style: none;
      padding: 0.5rem 0.9rem 0.6rem;
      margin: 0;
      background: #fafbfc;
    }

    .modal-pair-solutions li {
      font-size: 0.87rem;
      line-height: 1.65;
      color: var(--navy);
      padding: 0.3rem 0 0.3rem 1.2rem;
      position: relative;
      border-bottom: 1px solid var(--gray-100);
    }

    .modal-pair-solutions li:last-child { border-bottom: none; }

    .modal-pair-solutions li::before {
      content: '▶';
      position: absolute;
      left: 0;
      font-size: 0.55rem;
      color: var(--accent);
      top: 0.42rem;
    }

    /* scrollbar */
    .modal-content::-webkit-scrollbar { width: 4px; }
    .modal-content::-webkit-scrollbar-track { background: transparent; }
    .modal-content::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 99px; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 600px) {
      .header-top { padding: 0.75rem 1rem 0.4rem; }
      .header-titles h1 { font-size: 1.1rem; }
      .header-search { padding: 0.5rem 1rem; }
      .filter-scroll-wrap { padding: 0.45rem 0.8rem 0.6rem; }

      #card-container {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 0.65rem;
        padding: 0.7rem 0.8rem 3rem;
      }

      .card img { height: 75px; }
      .card h3 { font-size: 0.82rem; }

      .modal-content { max-height: 88vh; border-radius: 14px; }
      #modal-title { font-size: 1rem; }
      #modal-img { max-height: 160px; }
      .modal-header { padding: 0.85rem 1rem; border-radius: 14px 14px 0 0; }
      .modal-body { padding: 0.7rem 1rem 1.3rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-titles">
      <h1><a href="../index.html" style="color:inherit;text-decoration:none;">🔍 瓶胚異常快速查閱</a></h1>
      <h2>DEFECT QUICK REFERENCE SYSTEM</h2>
    </div>
    <span class="header-badge">2022 二版 &nbsp;|&nbsp; V1.0.0</span>
  </div>

  <div class="header-search">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="輸入關鍵字搜尋（名稱 / 原因 / 對策）">
    </div>
  </div>

  <div class="filter-scroll-wrap">
    <div id="filters">
    <button class="filter active" data-type="all">全部</button>
    <button class="filter" data-type="射出站">射出</button>
    <button class="filter" data-type="乾燥機">乾燥</button>
    <button class="filter" data-type="結晶站">結晶</button>
    <button class="filter" data-type="視檢站">視檢</button>
    </div>
  </div>
</header>

<div class="result-info" id="result-info"></div>
<main id="card-container"></main>

<!-- Modal -->
<div id="modal" class="hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button id="close" aria-label="關閉">&times;</button>
    </div>
    <div class="modal-img-wrap">
      <img id="modal-img" alt="">
    </div>
    <div class="modal-body">
      <div id="modal-pairs"></div>
    </div>
  </div>
</div>

<script>
const defects = [
  {
    "name": "高乙醛(A.A.)水平",
    "type": ["射出站", "乾燥機"],
    "img": "images/高乙醛(A.A.)水平.JPG",
    "reason": [
      "A.由於熔融物過量降解而形成過多的A.A.。(射出站)",
      "B.由於輸入原料顆粒的溫度過低而造成塑化過程中產生過多的剪切熱量。(射出站)",
      "C.PET酯粒原料已經降解。(乾燥機)",
      "D.PET酯粒原料的A.A.水平和配方與應用不匹配。(乾燥機)"
    ],
    "solution": [
      "A1.降低射出機料管溫度。",
      "A2.降低模具溫度。",
      "A3.透過降低螺桿轉速和背壓，減少剪切生熱。",
      "A4.透過降低輸料 / 射出速率，減少剪切生熱。",
      "A5.透過減小螺桿回退位置，使螺桿殘量降至最低。PS：注塑緩衝量一般為20-30mm。",
      "A6.透過縮短週期時間，縮短融熔塑料滯留時間。",
      "B1.提高射出機送料小料斗處的入料口溫度 (取於小料斗原料，一般為160℃-180℃)。PS : 為了減少剪切應力所以要高溫。",
      "C1.確認原料有無降解 (例如 I.V.) 和變色。PS : 與乾燥機有關。",
      "C2.確保二次烘料有無過度乾燥、變色或者與原始原料酯粒相黏合。PS : 乾燥時間太長而難熔融。",
      "D1.測試並確認原料乾燥前後的A.A.水平可以接受。PS：一般低於1ppm。",
      "D2.使用更適合於特定應用的備選PET酯粒原料。"
    ]
  },
  {
    "name": "高固有黏度(I.V.)降",
    "type": ["乾燥機", "射出站"],
    "img": "images/高固有黏度(I.V.)降.JPG",
    "reason": [
      "A.由於輸入原料的濕度過高而造成在塑化過程中發生水解降解，從而導致原料I.V.損失。(乾燥機)",
      "B.由於熱降解而造成I.V.下降。(乾燥機/射出站)",
      "C.確認輸入原料的I.V.符合規定。(乾燥機)"
    ],
    "solution": [
      "A1.檢查機器射出機入料口處四週有無漏氣。PS：酯粒水分應該低於50ppm。",
      "A2.確認乾燥機正常運行，確保溫度 (取決於原料)、空氣流量、露點和料斗滯留時間均在規定的範圍之內。",
      "B1.降低射出機/乾燥機的機器溫度。",
      "B2.透過降低螺桿轉速和背壓，減少剪切生熱。",
      "B3.透過降低輸料 / 射出速率，減少剪切生熱。",
      "B4.將注塑緩衝量降至最低。PS：一般為10-20mm。",
      "B5.透過縮短週期時間，縮短酯粒熔體滯留時間。",
      "B6.降低模具溫度。",
      "C1.檢測原料乾燥前後的I.V.，以確認質量可以接受。"
    ]
  },
  {
    "name": "黑點.污染",
    "type": ["射出站"],
    "img": "images/黑點.污染.JPG",
    "reason": [
      "A.由已降解熔體產生的黑色粒子。★正常開機狀況下(射出機久停重開，黑點多為正常)黑點由溫度產生的機會不大，最可能的是射出機料管加熱器(Heater)故障(超溫或不加溫)並非升降溫問題。★乾燥機滯留死角較易產生未熔融物。(射出站)",
      "B.上一次開機時的過熱材料仍然留在射出機料管和模具熱澆道中。(射出站)",
      "C.異物被射出到模具模穴中(例如紙張、紙板、密封件等)。(射出站)",
      "D.PET酯粒原料即帶有異物或老化物。(射出站)"
    ],
    "solution": [
      "A1.降低模具注口溫度。",
      "A2.降低模具熱澆道溫度。",
      "A3.降低射出機料管溫度。",
      "A4.透過降低螺桿速度、背壓和 / 或儲料 / 射出速度來減少剪切生熱。",
      "A5.將開機時間的預熱時間降至最低。",
      "A6.在啟動前進行注塑室清料，確保沖淨所有黑斑及已降解原料 (已變色)。增大前幾次清料的注射量可能有助於提高清料速度。",
      "A7.如果原料已經轉換為一種需要更高加工溫度的材料，除非舊有原料已完全沖淨，否則可能會產生黑斑。",
      "A8.確認原料乾燥機正常運作，確保溫度(取決於原料)、空氣流量、露點和料斗滯留時間均在規定範圍之內。",
      "A9.確認模具注口 / 隔熱帽 / 模穴底區域沒有損壞。",
      "B1.在停機時，徹底地進行射出機料管及射出室清空，並立即降低射出料管加熱。",
      "B2.在關閉系統時，立即關閉模具注口加熱器，然後關閉熱澆道加熱器，並保持冷卻水在整個模具內循環流動，直到熱澆道溫度降至100℃以下為止。",
      "C1.確認原料有無污染。",
      "C2.確認料斗磁鐵、料斗及原料入口管中有無異物。",
      "C3.確認原料輸送系統中有無異物。",
      "C4.確認混料和 / 或顏色添加劑設備中有無異物。",
      "D1.確認原料有無污染。",
      "D2.確認料斗磁鐵、料斗及原料入口管中有無異物。",
      "D3.確認原料輸送系統中有無異物。",
      "D4.確認再生料和色漿機設備有無異物。"
    ]
  },
  {
    "name": "主體成橢圓形(胚身翹曲)",
    "type": ["射出站"],
    "img": "images/主體成橢圓形(胚身翹曲).JPG",
    "reason": [
      "A.由於冷卻不足而造成瓶胚下部位翹曲。(射出站)",
      "B.由於射出料管內酯粒熔融溫度過高而造成冷卻需求提高。(射出站)",
      "C.由於射出充填不足而造成翹曲。(射出站)",
      "D.由於成品於模內冷卻時間過長而造成瓶胚凹陷。(射出站)",
      "E.機械損壞。(射出站)",
      "F.由於瓶胚不均勻冷卻而造成翹曲。(射出站)",
      "G.模穴內熔融PET酯料的流動受到限制。(射出站)"
    ],
    "solution": [
      "A1.確認模具冷卻管道有無堵塞且具有足夠的冷卻能力，特別是模芯冷卻管、型芯及取出機套桶。",
      "A2.確認冷卻溫度是否正確。",
      "A3.確認Cool Jet氣孔通風道有無堵塞。",
      "A4.延長保壓時間 / 冷卻時間。",

const container = document.getElementById("card-container");
const modal = document.getElementById("modal");
const modalTitle = document.getElementById("modal-title");
const modalImg = document.getElementById("modal-img");
const closeBtn = document.getElementById("close");
const modalPairs = document.getElementById("modal-pairs");
const resultInfo = document.getElementById("result-info");

let currentType = "all";
let keyword = "";

function getTypeLabel(type) {
  if (Array.isArray(type)) return type[0];
  return type;
}

function renderCards(list) {
  container.innerHTML = "";
  resultInfo.textContent = `共 ${list.length} 項異常`;

  if (list.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🔎</div><p>找不到符合條件的異常項目</p></div>`;
    return;
  }

  list.forEach((d, i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = `${Math.min(i * 0.03, 0.5)}s`;
    card.innerHTML = `
      <img src="${d.img}" alt="${d.name}" loading="lazy" onerror="this.style.display='none'">
      <div class="card-tag">${getTypeLabel(d.type)}</div>
      <h3>${d.name}</h3>
    `;
    card.onclick = () => openModal(d);
    container.appendChild(card);
  });
}

function openModal(d) {
  modalTitle.innerText = d.name;
  modalImg.src = d.img;
  modalImg.alt = d.name;

  const solutionMap = {};
  d.solution.forEach(text => {
    const m = text.match(/^([A-Za-z])/);
    if (!m) return;
    const key = m[1];
    if (!solutionMap[key]) solutionMap[key] = [];
    solutionMap[key].push(text);
  });

  let html = "";
  d.reason.forEach(r => {
    const m = r.match(/^([A-Za-z])/);
    const key = m ? m[1] : "";
    const sols = solutionMap[key] || [];
    html += `
      <div class="modal-pair">
        <div class="modal-pair-header">
          <span class="cause-label">${key || '?'}</span>
          <span>${r.replace(/^[A-Za-z]\./, '').trim()}</span>
        </div>
        ${sols.length ? `<ul class="modal-pair-solutions">${sols.map(s => `<li>${s}</li>`).join("")}</ul>` : ""}
      </div>
    `;
  });

  modalPairs.innerHTML = html;
  modal.classList.remove("hidden");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  modal.classList.add("hidden");
  document.body.style.overflow = "";
}

modal.addEventListener("click", e => { if (e.target === modal) closeModal(); });
closeBtn.addEventListener("click", closeModal);
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

function applyFilter() {
  const kw = keyword.trim().toLowerCase();
  const list = defects.filter(d => {
    let matchType = currentType === "all" ||
      (Array.isArray(d.type) ? d.type.includes(currentType) : d.type === currentType);
    const text = (d.name || "") + " " +
      (Array.isArray(d.reason) ? d.reason.join(" ") : "") + " " +
      (Array.isArray(d.solution) ? d.solution.join(" ") : "");
    const matchKeyword = !kw || text.toLowerCase().includes(kw);
    return matchType && matchKeyword;
  });
  renderCards(list);
}

document.querySelectorAll(".filter").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".filter").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentType = btn.dataset.type;
    applyFilter();
  };
});

const searchInput = document.getElementById("search-input");
if (searchInput) {
  searchInput.addEventListener("input", () => {
    keyword = searchInput.value;
    applyFilter();
  });
}

document.addEventListener("DOMContentLoaded", () => { applyFilter(); });
applyFilter();
(function() {
  const q = new URLSearchParams(window.location.search).get('q');
  if (q && searchInput) { searchInput.value = q; keyword = q; applyFilter(); }
})();
</script>
