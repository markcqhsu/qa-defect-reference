<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>瓶口尺寸表</title>
    <style>
body {
    font-size: 18px;
    line-height: 1.6;
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 20px;
    background: linear-gradient(to bottom, #f8f0e3, #e6dac5);
    color: #5C4033;
}

button {
    display: block;
    width: 200px;
    padding: 14px;
    margin: 12px auto;
    font-size: 19px;
    cursor: pointer;
    border: none;
    background-color: #F5DEB3;
    color: #5C4033;
    font-weight: bold;
    border: 2px solid #8B4513;
    border-radius: 8px;
    box-shadow: 1px 2px 5px rgba(0, 0, 0, 0.15);
    transition: all 0.3s ease-in-out;
}

button:hover {
    background-color: #EED5B7;
    border-color: #A0522D;
    color: #3E2723;
    transform: translateY(-2px);
    box-shadow: 4px 6px 12px rgba(0, 0, 0, 0.3);
}

.hidden {
    display: none;
}

table {
    width: 70%;
    margin: 20px auto;
    border-collapse: collapse;
    background-color: rgba(255, 228, 181, 0.9);
    color: #444;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 4px 4px 12px rgba(0, 0, 0, 0.15);
    white-space: nowrap;
}

table, th, td {
    border: 1px solid #A0522D;
}

th {
    background: linear-gradient(135deg, #D2691E, #A0522D);
    color: white;
    padding: 12px;
    font-size: 18px;
}

td {
    padding: 14px;
    font-size: 18px;
}

tr:nth-child(even) {
    background-color: rgba(255, 239, 213, 0.6);
}

tr:hover {
    background-color: #FFA07A;
    transition: 0.3s;
}

.back-btn, .home-btn {
    background: linear-gradient(135deg, #E3BA89, #C0966B);
    color: #5C4033;
    font-weight: bold;
    padding: 12px;
    width: 220px;
    border-radius: 12px;
    box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.2);
    transition: all 0.3s ease-in-out;
    border: none;
}

.back-btn:hover, .home-btn:hover {
    background: linear-gradient(135deg, #D2A679, #A07552);
    transform: translateY(-2px);
    box-shadow: 4px 6px 12px rgba(0, 0, 0, 0.3);
}

#date-btn {
    font-size: 18px;
    color: #555;
    font-weight: bold;
    text-align: center;
    margin-top: 20px;
    padding: 10px;
    border-top: 2px solid #ccc;
    display: inline-block;
    background: rgba(255, 239, 213, 0.7);
    border-radius: 8px;
    box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.2);
    border: none;
}

.home-home-btn {
    position: fixed;
    top: 10px;
    right: 10px;
    width: 35px;
    height: 35px;
    font-size: 18px;
    background: #A0522D;
    color: white;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
    transition: all 0.2s ease-in-out;
    display: flex;
    align-items: center;
    justify-content: center;
}

.home-home-btn:hover {
    background: #D2691E;
    transform: scale(1.1);
}

.back-back-btn {
    position: fixed;
    top: 10px;
    left: 10px;
    width: 40px;
    height: 40px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    font-size: 24px;
}

.back-back-btn:hover {
    transform: scale(1.1);
}

@media (max-width: 768px) {
    button {
        width: 70%;
        margin: 15px auto;
    }
}

@media (max-width: 768px) {
    table {
        width: 100%;
        font-size: 18px;
    }

    th, td {
        padding: 10px;
        font-size: 18px;
    }
}
    </style>
  </head>

    <button onclick="goBack()" class="back-back-btn">⬅️</button>

      <button onclick="showModels('熱充瓶口')">熱充瓶口</button>
      <button onclick="showModels('醬油瓶口')">醬油瓶口</button>
      <button onclick="showModels('日化瓶口')">日化瓶口</button>
      <button id="date-btn" onclick="showMessage()">
        📅最後更新日期: 2025/10/17(點我)
      </button>
    </div>

    <!-- 第二層：選擇模號 -->
    <div id="model-menu" class="hidden">
      <h3 id="model-title"></h3>
      <div id="model-buttons"></div>
      <button onclick="goHome()" class="home-btn">回到首頁🏠</button>
    </div>

    <!-- 第三層：顯示產品資訊 -->

      <table id="info-table"></table>
      <div id="info-image"></div>
      <button onclick="goBack()" class="back-btn">返回蓋型⬅️</button
      ><button onclick="goHome()" class="home-btn">回到首頁🏠</button>

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("product-menu").classList.remove("hidden");
  currentStep = "product-menu";
});

function showModels(productType) {
  document.getElementById("product-menu").classList.add("hidden");
  document.getElementById("model-menu").classList.remove("hidden");

  document.getElementById("model-title").innerText = `選擇 ${productType} 的蓋型`;
  const modelButtons = document.getElementById("model-buttons");
  modelButtons.innerHTML = "";

  const models = productsData[productType];
  Object.keys(models).forEach((model) => {
    let btn = document.createElement("button");
    btn.innerText = model;
    btn.onclick = function () {
      showInfo(productType, model);
    };
    modelButtons.appendChild(btn);
  });

  currentStep = "model-menu";
}

function showInfo(productType, model) {
  document.getElementById("model-menu").classList.add("hidden");
  document.getElementById("info").classList.remove("hidden");

  document.getElementById("info-title").innerText = `瓶型：${model} (類型：${productType})`;

  const info = productsData[productType][model];
  const table = document.getElementById("info-table");
  table.innerHTML = "<tr><th>尺寸</th><th>標準(mm)</th></tr>";

  Object.keys(info).forEach((key) => {
    if (key !== "圖片") {
      let row = document.createElement("tr");
      row.innerHTML = `<td>${key}</td><td>${info[key]}</td>`;
      table.appendChild(row);
    }
  });

  const imageContainer = document.getElementById("info-image");
  imageContainer.innerHTML = "";

  if (info.圖片) {
    let img = document.createElement("img");
    img.src = info.圖片;
    img.alt = model;
    img.style.maxWidth = "200px";
    img.style.marginTop = "10px";
    imageContainer.appendChild(img);
  }

  currentStep = "info";
}

function goBack() {
  if (currentStep === "info") {
    document.getElementById("info").classList.add("hidden");
    document.getElementById("model-menu").classList.remove("hidden");
    currentStep = "model-menu";
  } else if (currentStep === "model-menu") {
    document.getElementById("model-menu").classList.add("hidden");
    document.getElementById("product-menu").classList.remove("hidden");
    currentStep = "product-menu";
  }
}

function goHome() {
  document.getElementById("info").classList.add("hidden");
  document.getElementById("model-menu").classList.add("hidden");
  document.getElementById("product-menu").classList.remove("hidden");
  currentStep = "product-menu";
}

function showMessage() {
  alert("實際尺寸以規格單為主\n尺寸更新；內容有誤通知達叔( ͡° ͜ʖ ͡°)");
}

</html>
