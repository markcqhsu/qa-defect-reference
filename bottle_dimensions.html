<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瓶口尺寸查詢</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4f8;
  --white: #ffffff;
  --navy: #0a1628;
  --accent: #0e8a6e;
  --accent-light: #e6f7f3;
  --text: #1e293b;
  --muted: #64748b;
  --border: #e2e8f0;
  --hover: #f8fafc;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.16);
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── Header ── */
header {
  background: var(--navy);
  padding: 1rem 1.5rem;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.header-left { display: flex; align-items: center; gap: 0.8rem; }
.header-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.header-icon svg { width: 20px; height: 20px; stroke: white; fill: none; }
header h1 { font-size: 1.1rem; font-weight: 700; color: white; }
.header-meta { font-size: 0.72rem; color: #94a3b8; }
.home-btn { color: #94a3b8; text-decoration: none; font-size: 0.8rem; padding: 0.4rem 0.8rem; border: 1px solid #334155; border-radius: 6px; transition: all 0.2s; }
.home-btn:hover { color: white; border-color: #64748b; }

/* ── Controls ── */
.controls { background: white; border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; flex-direction: column; gap: 0.8rem; }
.search-wrap { position: relative; max-width: 400px; }
.search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; stroke: var(--muted); fill: none; }
#searchInput {
  width: 100%; padding: 0.6rem 0.8rem 0.6rem 2.4rem;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 0.9rem; color: var(--text); outline: none;
  font-family: inherit; transition: border-color 0.2s;
}
#searchInput:focus { border-color: var(--accent); }
#searchInput::placeholder { color: #94a3b8; }

.filter-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.filter-btn {
  padding: 0.35rem 0.9rem; border-radius: 99px;
  border: 1.5px solid var(--border); background: white;
  font-size: 0.8rem; font-weight: 500; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  font-family: inherit;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

/* ── Main ── */
main { padding: 1.25rem 1.5rem 3rem; max-width: 1200px; margin: 0 auto; }
.result-info { font-size: 0.78rem; color: var(--muted); margin-bottom: 1rem; }

/* ── Category section ── */
.cat-section { margin-bottom: 2rem; }
.cat-title {
  font-size: 0.78rem; font-weight: 700; color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 0.8rem; padding-left: 0.2rem;
}

/* ── Table wrapper ── */
.table-wrap {
  background: white; border-radius: var(--radius);
  border: 1.5px solid var(--border); box-shadow: var(--shadow);
  overflow: hidden;
}
.table-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 640px; }
thead tr { background: var(--navy); }
thead th {
  padding: 0.75rem 1rem; text-align: left;
  font-size: 0.75rem; font-weight: 600; color: #94a3b8;
  letter-spacing: 0.05em; white-space: nowrap;
}
thead th:first-child { color: white; min-width: 160px; }
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--accent-light); }
tbody td { padding: 0.7rem 1rem; font-size: 0.85rem; color: var(--text); white-space: nowrap; }
tbody td:first-child { font-weight: 700; color: var(--text); min-width: 160px; }
.val { color: var(--text); }
.val-dash { color: #cbd5e1; }
.highlight-row { background: #fafff9 !important; }
.highlight-row td:first-child { color: var(--accent); }

/* ── No result ── */
.no-result { text-align: center; padding: 4rem 1rem; color: var(--muted); }

/* ── Notice ── */
.notice {
  background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px;
  padding: 0.8rem 1rem; font-size: 0.78rem; color: #92400e;
  display: flex; gap: 0.5rem; align-items: flex-start; margin-bottom: 1.25rem;
}
.notice svg { width: 16px; height: 16px; stroke: #d97706; fill: none; flex-shrink: 0; margin-top: 1px; }

@media (max-width: 640px) {
  header { padding: 0.8rem 1rem; }
  .controls { padding: 0.8rem 1rem; }
  main { padding: 1rem 0.75rem 3rem; }
  thead th, tbody td { padding: 0.6rem 0.75rem; font-size: 0.78rem; }
}
</style>
</head>

const cols = ["瓶口內徑(I)", "瓶口外徑(E)", "螺牙外徑(T)", "防盜環外徑(A)", "防盜環高度(D)", "支撐環高度(F)", "支撐環外徑(Z)"];
const colUnits = cols.map(c => `${c}\n(mm)`);
const categories = Object.keys(productsData);

let activeCategory = 'all';
let searchTerm = '';

// Build filter buttons
const filterRow = document.getElementById('filterRow');
const totalCount = categories.reduce((s, c) => s + Object.keys(productsData[c]).length, 0);
const allBtn = document.createElement('button');
allBtn.className = 'filter-btn active';
allBtn.textContent = `全部 (${totalCount})`;
allBtn.dataset.cat = 'all';
allBtn.onclick = () => setFilter('all');
filterRow.appendChild(allBtn);

for (const cat of categories) {
  const count = Object.keys(productsData[cat]).length;
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.textContent = `${cat} (${count})`;
  btn.dataset.cat = cat;
  btn.onclick = () => setFilter(cat);
  filterRow.appendChild(btn);
}

function setFilter(cat) {
  activeCategory = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  render();
}

document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value.trim().toLowerCase();
  render();
});

function render() {
  const content = document.getElementById('content');
  const noResult = document.getElementById('noResult');
  const resultInfo = document.getElementById('resultInfo');

  const catsToShow = activeCategory === 'all' ? categories : [activeCategory];
  let totalShown = 0;
  let html = '';

  for (const cat of catsToShow) {
    const models = productsData[cat];
    const filtered = Object.entries(models).filter(([name]) =>
      !searchTerm || name.toLowerCase().includes(searchTerm) || cat.toLowerCase().includes(searchTerm)
    );
    if (filtered.length === 0) continue;
    totalShown += filtered.length;

    const headerCols = cols.map(c => `<th>${c}</th>`).join('');
    const rows = filtered.map(([name, specs]) => {
      const cells = cols.map(c => {
        const v = specs[c] || '—';
        const isDash = v === '—';
        return `<td class="${isDash ? 'val-dash' : 'val'}">${v}</td>`;
      }).join('');
      return `<tr><td>${name}</td>${cells}</tr>`;
    }).join('');

    html += `
      <div class="cat-section">
        <div class="cat-title">${cat}</div>
        <div class="table-wrap">
          <div class="table-scroll">
            <table>
              <thead><tr><th>型號</th>${headerCols}</tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      </div>`;
  }

  resultInfo.textContent = `顯示 ${totalShown} / ${totalCount} 筆`;

  if (totalShown === 0) {
    content.innerHTML = '';
    noResult.style.display = 'block';
  } else {
    noResult.style.display = 'none';
    content.innerHTML = html;
  }
}

render();
</script>
