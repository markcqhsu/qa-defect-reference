<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瓶口尺寸查詢</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a1628;
    --navy-mid: #112240;
    --navy-light: #1a3a5c;
    --accent: #e8a020;
    --accent-light: #f5bb4a;
    --accent-dim: rgba(232,160,32,0.15);
    --white: #ffffff;
    --gray-100: #f0f2f5;
    --gray-200: #e2e6ec;
    --gray-400: #8a98ab;
    --gray-600: #4a5568;
    --card-shadow: 0 4px 20px rgba(0,0,0,0.08);
    --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC','Microsoft JhengHei',sans-serif; background: var(--gray-100); color: var(--navy); min-height: 100vh; }

  /* ─── HEADER ─── */
  header { background: var(--navy); position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.9rem 1.5rem 0.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.06); gap: 1rem;
  }
  .header-titles h1 { font-size: 1.35rem; font-weight: 900; color: var(--white); letter-spacing: 0.04em; }
  .header-titles h1 a { color: inherit; text-decoration: none; }
  .header-titles h2 { font-size: 0.72rem; font-weight: 400; color: var(--gray-400); letter-spacing: 0.06em; margin-top: 2px; }
  .header-badge {
    background: var(--accent); color: var(--navy);
    font-size: 0.7rem; font-weight: 700;
    padding: 0.25rem 0.7rem; border-radius: 99px;
    letter-spacing: 0.05em; white-space: nowrap;
  }

  /* ─── SEARCH ─── */
  .header-search { padding: 0.6rem 1.5rem; }
  .search-wrap { position: relative; max-width: 480px; margin: 0 auto; }
  .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--gray-400); font-size: 1rem; pointer-events: none; }
  #search-input {
    width: 100%; padding: 0.65rem 1rem 0.65rem 2.6rem;
    font-size: 0.9rem; font-family: inherit;
    border-radius: 999px; border: 1.5px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.07); color: var(--white); outline: none;
    transition: border-color var(--transition), background var(--transition);
  }
  #search-input::placeholder { color: var(--gray-400); }
  #search-input:focus { border-color: var(--accent); background: rgba(255,255,255,0.11); }

  /* ─── FILTER PILLS ─── */
  .filter-scroll-wrap { overflow-x: auto; padding: 0.55rem 1rem 0.7rem; scrollbar-width: none; }
  .filter-scroll-wrap::-webkit-scrollbar { display: none; }
  #filters { display: flex; gap: 0.45rem; width: max-content; }
  .filter {
    padding: 0.38rem 0.9rem; font-size: 0.82rem; font-family: inherit; font-weight: 500;
    border: 1.5px solid rgba(255,255,255,0.15); border-radius: 99px;
    background: transparent; color: rgba(255,255,255,0.7);
    cursor: pointer; white-space: nowrap; transition: all var(--transition); letter-spacing: 0.02em;
  }
  .filter:hover { background: rgba(255,255,255,0.1); color: var(--white); border-color: rgba(255,255,255,0.3); }
  .filter.active { background: var(--accent); color: var(--navy); border-color: var(--accent); font-weight: 700; }

  /* ─── RESULT INFO ─── */
  .result-info { padding: 0.7rem 1.5rem 0.2rem; font-size: 0.78rem; color: var(--gray-600); letter-spacing: 0.02em; }

  /* ─── CONTENT ─── */
  #content { padding: 0.5rem 1rem 3rem; }

  .cat-block { margin-bottom: 1.75rem; animation: cardFadeIn 0.3s ease both; }
  @keyframes cardFadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .cat-label {
    font-size: 0.72rem; font-weight: 700; color: var(--gray-400);
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 0.6rem; padding-left: 0.3rem;
  }

  /* ─── TABLE ─── */
  .table-wrap {
    background: var(--white); border-radius: 12px;
    box-shadow: var(--card-shadow); overflow: hidden;
  }
  .table-scroll { overflow-x: auto; }
  .table-scroll::-webkit-scrollbar { height: 4px; }
  .table-scroll::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 99px; }

  table { width: 100%; border-collapse: collapse; min-width: 700px; }
  thead tr { background: var(--navy); }
  thead th {
    padding: 0.75rem 1rem; text-align: left;
    font-size: 0.72rem; font-weight: 700; color: var(--gray-400);
    letter-spacing: 0.06em; white-space: nowrap;
  }
  thead th:first-child { color: var(--white); min-width: 155px; }
  tbody tr { border-bottom: 1px solid var(--gray-100); transition: background var(--transition); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fffbf0; }
  tbody td { padding: 0.7rem 1rem; font-size: 0.84rem; white-space: nowrap; }
  tbody td:first-child { font-weight: 700; color: var(--navy); }
  .val { color: var(--navy); font-weight: 500; }
  .val-dash { color: var(--gray-200); }

  /* ─── NOTICE ─── */
  .notice {
    margin: 0 1rem 1rem; padding: 0.7rem 1rem;
    background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px;
    font-size: 0.75rem; color: #92400e; display: flex; gap: 0.4rem;
  }

  /* ─── EMPTY ─── */
  .empty-state { text-align: center; padding: 4rem 1rem; color: var(--gray-400); }
  .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty-state p { font-size: 0.95rem; }

  @media (max-width: 600px) {
    .header-top { padding: 0.75rem 1rem 0.4rem; }
    .header-titles h1 { font-size: 1.1rem; }
    .header-search { padding: 0.5rem 1rem; }
    .filter-scroll-wrap { padding: 0.45rem 0.8rem 0.6rem; }
    #content { padding: 0.5rem 0.75rem 3rem; }
    thead th, tbody td { padding: 0.6rem 0.75rem; font-size: 0.78rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-titles">
      <h1><a href="index.html">📏 瓶口尺寸查詢</a></h1>
      <h2>BOTTLE MOUTH DIMENSIONS REFERENCE</h2>
    </div>
    <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;justify-content:flex-end;">
      <a href="bottle/bottle.html" style="color:var(--gray-400);text-decoration:none;font-size:0.72rem;border:1px solid rgba(255,255,255,0.15);padding:0.25rem 0.6rem;border-radius:6px;white-space:nowrap;transition:color 0.2s;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--gray-400)'">吹瓶異常 →</a>
      <span class="header-badge" id="total-badge">— 型號</span>
    </div>
  </div>
  <div class="header-search">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="搜尋瓶型（如 1810、38mm、扣蓋…）" autocomplete="off">
    </div>
  </div>
  <div class="filter-scroll-wrap">

</header>

<div class="result-info" id="result-info"></div>

<div class="notice">
  ⚠️ 實際尺寸以規格單為主，如有疑問請洽蓋品課（達叔）
</div>

<div id="content"></div>

const cols = ["瓶口內徑(I)", "瓶口外徑(E)", "螺牙外徑(T)", "防盜環外徑(A)", "防盜環高度(D)", "支撐環高度(F)", "支撐環外徑(Z)"];
const categories = Object.keys(productsData);
const totalCount = categories.reduce((s, c) => s + Object.keys(productsData[c]).length, 0);
document.getElementById('total-badge').textContent = totalCount + ' 型號';

// Filter pills
const filtersEl = document.getElementById('filters');
const makeFilter = (label, cat) => {
  const btn = document.createElement('button');
  btn.className = 'filter' + (cat === 'all' ? ' active' : '');
  btn.textContent = label;
  btn.dataset.cat = cat;
  btn.onclick = () => setFilter(cat);
  filtersEl.appendChild(btn);
};
makeFilter(`全部 (${totalCount})`, 'all');
for (const c of categories) makeFilter(`${c} (${Object.keys(productsData[c]).length})`, c);

let activeCategory = 'all', searchTerm = '';

function setFilter(cat) {
  activeCategory = cat;
  document.querySelectorAll('.filter').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  render();
}

document.getElementById('search-input').addEventListener('input', e => {
  searchTerm = e.target.value.trim().toLowerCase();
  render();
});

function render() {
  const content = document.getElementById('content');
  const catsToShow = activeCategory === 'all' ? categories : [activeCategory];
  let totalShown = 0;
  let html = '';

  for (const cat of catsToShow) {
    const filtered = Object.entries(productsData[cat]).filter(([name]) =>
      !searchTerm || name.toLowerCase().includes(searchTerm) || cat.toLowerCase().includes(searchTerm)
    );
    if (!filtered.length) continue;
    totalShown += filtered.length;

    const headerCells = cols.map(c => `<th>${c}<br><span style="font-weight:400;opacity:0.6;">(mm)</span></th>`).join('');
    const rows = filtered.map(([name, specs]) => {
      const cells = cols.map(c => {
        const v = specs[c] || '—';
        return `<td class="${v === '—' ? 'val-dash' : 'val'}">${v}</td>`;
      }).join('');
      return `<tr><td>${name}</td>${cells}</tr>`;
    }).join('');

    html += `<div class="cat-block">
      <div class="cat-label">${cat}</div>
      <div class="table-wrap">
        <div class="table-scroll">
          <table>
            <thead><tr><th>型號</th>${headerCells}</tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    </div>`;
  }

  document.getElementById('result-info').textContent = `顯示 ${totalShown} / ${totalCount} 筆`;

  if (!totalShown) {
    content.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><p>找不到「${searchTerm}」，請嘗試其他關鍵字</p></div>`;
  } else {
    content.innerHTML = html;
  }
}

render();
</script>
</body>
</html>
