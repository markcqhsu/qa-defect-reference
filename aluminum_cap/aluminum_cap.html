<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>鋁蓋異常快速查閱</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0a1628;
      --navy-mid: #112240;
      --navy-light: #1a3a5c;
      --accent: #e8a020;
      --accent-light: #f5bb4a;
      --accent-dim: rgba(232, 160, 32, 0.15);
      --white: #ffffff;
      --gray-100: #f0f2f5;
      --gray-200: #e2e6ec;
      --gray-400: #8a98ab;
      --gray-600: #4a5568;
      --danger: #e05252;
      --success: #38b28a;
      --card-shadow: 0 4px 20px rgba(0,0,0,0.08);
      --card-hover-shadow: 0 12px 40px rgba(0,0,0,0.15);
      --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
      background: var(--gray-100);
      color: var(--navy);
      min-height: 100vh;
    }

    /* ─── HEADER ─── */
    header {
      background: var(--navy);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.5rem 0.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .header-titles h1 {
      font-size: 1.35rem;
      font-weight: 900;
      color: var(--white);
      letter-spacing: 0.04em;
    }

    .header-titles h2 {
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--gray-400);
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    .header-badge {
      background: var(--accent);
      color: var(--navy);
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.25rem 0.7rem;
      border-radius: 99px;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    /* Search */
    .header-search {
      padding: 0.6rem 1.5rem;
    }

    .search-wrap {
      position: relative;
      max-width: 480px;
      margin: 0 auto;
    }

    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-400);
      font-size: 1rem;
      pointer-events: none;
    }

    #search-input {
      width: 100%;
      padding: 0.65rem 1rem 0.65rem 2.6rem;
      font-size: 0.9rem;
      font-family: inherit;
      border-radius: 999px;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.07);
      color: var(--white);
      outline: none;
      transition: border-color var(--transition), background var(--transition);
    }

    #search-input::placeholder { color: var(--gray-400); }
    #search-input:focus {
      border-color: var(--accent);
      background: rgba(255,255,255,0.11);
    }

    /* Filter Pills */
    .filter-scroll-wrap {
      overflow-x: auto;
      padding: 0.55rem 1rem 0.7rem;
      scrollbar-width: none;
    }
    .filter-scroll-wrap::-webkit-scrollbar { display: none; }

    #filters {
      display: flex;
      gap: 0.45rem;
      width: max-content;
    }

    .filter {
      padding: 0.38rem 0.9rem;
      font-size: 0.82rem;
      font-family: inherit;
      font-weight: 500;
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 99px;
      background: transparent;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      white-space: nowrap;
      transition: all var(--transition);
      letter-spacing: 0.02em;
    }

    .filter:hover {
      background: rgba(255,255,255,0.1);
      color: var(--white);
      border-color: rgba(255,255,255,0.3);
    }

    .filter.active {
      background: var(--accent);
      color: var(--navy);
      border-color: var(--accent);
      font-weight: 700;
    }

    /* Result count */
    .result-info {
      padding: 0.7rem 1.5rem 0.2rem;
      font-size: 0.78rem;
      color: var(--gray-600);
      letter-spacing: 0.02em;
    }

    /* ─── CARDS ─── */
    #card-container {
      padding: 0.8rem 1rem 3rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 0.8rem;
    }

    .card {
      background: var(--white);
      border-radius: 12px;
      padding: 0.7rem 0.6rem 0.8rem;
      cursor: pointer;
      text-align: center;
      box-shadow: var(--card-shadow);
      transition: transform var(--transition), box-shadow var(--transition);
      border: 1.5px solid transparent;
      animation: cardFadeIn 0.3s ease both;
      position: relative;
      overflow: hidden;
    }

    @keyframes cardFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
      transform: scaleX(0);
      transition: transform var(--transition);
      transform-origin: left;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--card-hover-shadow);
      border-color: var(--accent-light);
    }

    .card:hover::before { transform: scaleX(1); }

    .card img {
      width: 100%;
      height: 90px;
      object-fit: contain;
      border-radius: 6px;
      background: var(--gray-100);
      margin-bottom: 0.5rem;
    }

    .card-tag {
      display: inline-block;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 0.1rem 0.45rem;
      border-radius: 4px;
      margin-bottom: 0.3rem;
    }

    .card h3 {
      font-size: 0.88rem;
      font-weight: 700;
      line-height: 1.4;
      color: var(--navy);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Empty state */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--gray-400);
    }

    .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-state p { font-size: 0.95rem; }

    /* ─── MODAL ─── */
    #modal {
      position: fixed;
      inset: 0;
      background: rgba(5, 10, 20, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 9999;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    #modal.hidden { display: none !important; }

    .modal-content {
      background: var(--white);
      width: 100%;
      max-width: 600px;
      border-radius: 16px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
      animation: modalSlideUp 0.28s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes modalSlideUp {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-header {
      background: var(--navy);
      padding: 1.1rem 1.3rem;
      border-radius: 16px 16px 0 0;
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    #modal-title {
      font-size: 1.15rem;
      font-weight: 900;
      color: var(--white);
      letter-spacing: 0.04em;
    }

    #close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      color: var(--white);
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition);
      flex-shrink: 0;
      line-height: 1;
    }

    #close:hover { background: rgba(255,255,255,0.25); }

    .modal-img-wrap {
      padding: 1rem 1.3rem 0.5rem;
      background: var(--gray-100);
      border-bottom: 1px solid var(--gray-200);
    }

    #modal-img {
      width: 100%;
      max-height: 220px;
      object-fit: contain;
      border-radius: 8px;
      display: block;
    }

    .modal-body {
      padding: 0.8rem 1.3rem 1.5rem;
    }

    .modal-pair {
      margin-bottom: 0.9rem;
      border-radius: 10px;
      overflow: hidden;
      border: 1.5px solid var(--gray-200);
    }

    .modal-pair-header {
      background: var(--navy-mid);
      color: var(--white);
      font-weight: 700;
      font-size: 0.88rem;
      padding: 0.6rem 0.9rem;
      line-height: 1.5;
      display: flex;
      gap: 0.5rem;
      align-items: flex-start;
    }

    .cause-label {
      background: var(--accent);
      color: var(--navy);
      font-size: 0.72rem;
      font-weight: 900;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 1px;
      letter-spacing: 0.04em;
    }

    .modal-pair-solutions {
      list-style: none;
      padding: 0.5rem 0.9rem 0.6rem;
      margin: 0;
      background: #fafbfc;
    }

    .modal-pair-solutions li {
      font-size: 0.87rem;
      line-height: 1.65;
      color: var(--navy);
      padding: 0.3rem 0 0.3rem 1.2rem;
      position: relative;
      border-bottom: 1px solid var(--gray-100);
    }

    .modal-pair-solutions li:last-child { border-bottom: none; }

    .modal-pair-solutions li::before {
      content: '▶';
      position: absolute;
      left: 0;
      font-size: 0.55rem;
      color: var(--accent);
      top: 0.42rem;
    }

    /* scrollbar */
    .modal-content::-webkit-scrollbar { width: 4px; }
    .modal-content::-webkit-scrollbar-track { background: transparent; }
    .modal-content::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 99px; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 600px) {
      .header-top { padding: 0.75rem 1rem 0.4rem; }
      .header-titles h1 { font-size: 1.1rem; }
      .header-search { padding: 0.5rem 1rem; }
      .filter-scroll-wrap { padding: 0.45rem 0.8rem 0.6rem; }

      #card-container {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 0.65rem;
        padding: 0.7rem 0.8rem 3rem;
      }

      .card img { height: 75px; }
      .card h3 { font-size: 0.82rem; }

      .modal-content { max-height: 88vh; border-radius: 14px; }
      #modal-title { font-size: 1rem; }
      #modal-img { max-height: 160px; }
      .modal-header { padding: 0.85rem 1rem; border-radius: 14px 14px 0 0; }
      .modal-body { padding: 0.7rem 1rem 1.3rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-titles">
      <h1><a href="../index.html" style="color:inherit;text-decoration:none;">🔍 鋁蓋異常快速查閱</a></h1>
      <h2>DEFECT QUICK REFERENCE SYSTEM</h2>
    </div>
    <span class="header-badge">2022 二版 &nbsp;|&nbsp; V1.0.0</span>
  </div>

  <div class="header-search">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="輸入關鍵字搜尋（名稱 / 原因 / 對策）">
    </div>
  </div>

  <div class="filter-scroll-wrap">
    <div id="filters">
      <button class="filter active" data-type="all">全部</button>
    <button class="filter" data-type="原物料">原物料</button>
    <button class="filter" data-type="塗佈">塗佈</button>
    <button class="filter" data-type="印刷">印刷</button>
    <button class="filter" data-type="烘烤">烘烤</button>
    <button class="filter" data-type="半成品">半成品</button>
    <button class="filter" data-type="分條">分條</button>
    <button class="filter" data-type="沖壓">沖壓</button>
    <button class="filter" data-type="沖壓(離線作業)">沖壓(離線作業)</button>
    <button class="filter" data-type="長蓋沖壓">長蓋沖壓</button>
    <button class="filter" data-type="滾印">滾印</button>
    <button class="filter" data-type="滾花">滾花</button>
    <button class="filter" data-type="上膠">上膠</button>
    <button class="filter" data-type="高週波">高週波</button>
    <button class="filter" data-type="入墊">入墊</button>
    <button class="filter" data-type="綜合加工">綜合加工</button>
    <button class="filter" data-type="各製程加工">各製程加工</button>
    <button class="filter" data-type="封蓋">封蓋</button>
    </div>
  </div>
</header>

<div class="result-info" id="result-info"></div>
<main id="card-container"></main>

<!-- Modal -->
<div id="modal" class="hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button id="close" aria-label="關閉">&times;</button>
    </div>
    <div class="modal-img-wrap">
      <img id="modal-img" alt="">
    </div>
    <div class="modal-body">
      <div id="modal-pairs"></div>
    </div>
  </div>
</div>

<script>
const defects = [
    {
      name: "平坦度不佳",
      type: "塗佈",
      img: "images/平坦度不佳.JPG",
      reason: [
        "A.高黏度。",
        "B.滾筒。"
      ],
      solution: [
        "A1.調整黏度(加入適當稀釋劑)。",
        "B1.建議適合的溶劑或採用較軟的滾筒。"
      ]
    },
    {
      name: "針孔",
      type: "塗佈",
      img: "images/針孔.JPG",
      reason: [
        "A.塗漆污染。",
        "B.油層或髒粒。"
      ],
      solution: [
        "A1.更換新塗漆。",
        "B1.採用適合的溶劑調薄塗漆或預烤鐵材。"
      ]
    },
    {
      name: "火山口",
      type: "塗佈",
      img: "images/火山口.JPG",
      reason: [
        "A.塗漆污染。",
        "B.油層或髒粒。",
        "C.滑劑沒有分散完全。"
      ],
      solution: [
        "A1.更換新塗漆。",
        "B1.採用適合的溶劑調薄塗漆或預烤鐵材。",
        "C1.追加平坦劑。"
      ]
    },
    {
      name: "塗印起泡",
      type: "塗佈",
      img: "images/塗印起泡.JPG",
      reason: [
        "A.回抽馬達壓力過大。",
        "B.塗漆在管線內流量過小。",
        "C.塗漆生產循環落差過大。"
      ],
      solution: [
        "A1.調整回抽馬達壓力或增加管線中塗漆流量。",
        "B1.建議適合溶劑調低黏度。",
        "B2.加設壩條將氣泡與pick-up roller隔開。",
        "C1.控制塗料用量，減少落差產生之氣泡。"
      ]
    },
    {
      name: "塗印塗料垂流",
      type: "塗佈",
      img: "images/塗印塗料垂流.JPG",
      reason: [
        "A.使用揮發性太慢的溶劑。",
        "B.濕漆膜太厚。"
      ],
      solution: [
        "A1.減少溶劑使用量或使用高揮發性溶劑。",
        "B1.降低漆膜厚度。"
      ]
    },
    {
      name: "塗印塗料流展性差",
      type: "塗佈",
      img: "images/塗印塗料流展性差.JPG",
      reason: [
        "A.滾筒不良。",
        "B.黏度不適。",
        "C.塗料儲放太久。",
        "D.塗佈量太高。",
        "E.塗料樹脂固成分過高，影響塗料流展。"
      ],
      solution: [
        "A1.採用適當滾筒。",
        "B1.用適當溶劑調整黏度。",
        "C1.依先進先出管理並記錄。",
        "D1.調整塗佈量，以管制塗佈標準厚度。",
        "E1.更換新塗料，並要求協力商進行調整。"
      ]
    },
    {
      name: "背面沾漆",
      type: ["塗佈","印刷"],
      img: "images/背面沾漆.JPG",
      reason: [
        "A.傳動滾筒太髒(塗佈)。",
        "B.刮刀磨損(塗佈)。",
        "C.刮刀沾附溶劑雜質，造成塗佈上墨時污染(塗佈)。",
        "D.烘烤溫度不足，乾燥不完全(塗佈)。",
        "E.印刷油墨未乾，造成輸送追疊沾漆(印刷)。"
      ],
      solution: [
        "A1.清洗傳動滾筒。",
        "B1.更換新刮刀。",
        "C1.更換溶劑。",
        "C2.清潔刮刀。",
        "D1.重新設定溫度。",
        "D2.延長烘烤時間。",
        "E1.調降輸送皮帶轉速與爐架速度搭配。"
      ]
    },{
      name: "塗印耐溶劑差",
      type: "塗佈",
      img: "images/塗印耐溶劑差.JPG",
      reason: [
        "A.塗佈量太低。",
        "B.塗料沒有烘乾。",
        "C.塗料樹脂物性不耐溶劑。"
      ],
      solution: [
        "A1.提高塗佈量。",
        "B1.重新測試並設定爐溫。",
        "C1.更換新塗料使用。"
      ]
    },
    {
      name: "塗佈魚眼",
      type: "塗佈",
      img: "images/塗佈魚眼.JPG",
      reason: [
        "A.塗料氣泡或外在油氣污染，使表面塗料排斥，造成魚眼現象。"
      ],
      solution: [
        "A1.減少塗料氣泡產生，控制攪拌及必要時添加消泡劑。"
      ]
    },{
      name: "上光不良",
      type: "塗佈",
      img: "images/上光不良.JPG",
      reason: [
        "A.底層印刷上色不均。",
        "B.塗佈輥筒橡膠包覆不良，使底層橡膠不紮實凹陷，造成光油塗佈不均。"
      ],
      solution: [
        "A1.檢查前製程印刷上色有無均勻度不佳，必要時須重新調整。",
        "B1.印刷塗佈預塗試片時，如遇顏色不均，必須即時更換膠輪並重新調整。"
      ]
    },{
      name: "塗佈不均",
      type: "塗佈",
      img: "images/塗佈不均.JPG",
      reason: [
        "A.雙張檢知器感應異常。",
        "B.塗佈輥筒橡膠包覆不良，使底層橡膠不紮實凹陷，造成塗佈不均。"
      ],
      solution: [
        "A1.確認調整檢知器若無效，則須更換新檢知器。",
        "B1.印刷塗佈預塗試片時，如遇顏色不均，必須即時更換膠輪並重新調整。"
      ]
    },
    {
      name: "素材刮擦傷",
      type: "印刷",
      img: "images/素材刮擦傷.JPG",
      reason: [
        "A.原素材即有的不良，如釋捲易見的刮擦傷及毛邊。",
        "B.素材表層潤滑不足，輸送 / 成捲時易造成表面刮擦傷。"
      ],
      solution: [
        "A1.更換新素材原料。",
        "B1.提高噴油頻率。"
      ]
    },
    {
      name: "墨皮轉印",
      type: "印刷",
      img: "images/墨皮轉印.JPG",

          "D1.更換內墊材質。"
        ]
      }
  ];

const container = document.getElementById("card-container");
const modal = document.getElementById("modal");
const modalTitle = document.getElementById("modal-title");
const modalImg = document.getElementById("modal-img");
const closeBtn = document.getElementById("close");
const modalPairs = document.getElementById("modal-pairs");
const resultInfo = document.getElementById("result-info");

let currentType = "all";
let keyword = "";

function getTypeLabel(type) {
  if (Array.isArray(type)) return type[0];
  return type;
}

function renderCards(list) {
  container.innerHTML = "";
  resultInfo.textContent = `共 ${list.length} 項異常`;

  if (list.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🔎</div><p>找不到符合條件的異常項目</p></div>`;
    return;
  }

  list.forEach((d, i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = `${Math.min(i * 0.03, 0.5)}s`;
    card.innerHTML = `
      <img src="${d.img}" alt="${d.name}" loading="lazy" onerror="this.style.display='none'">
      <div class="card-tag">${getTypeLabel(d.type)}</div>
      <h3>${d.name}</h3>
    `;
    card.onclick = () => openModal(d);
    container.appendChild(card);
  });
}

function openModal(d) {
  modalTitle.innerText = d.name;
  modalImg.src = d.img;
  modalImg.alt = d.name;

  const solutionMap = {};
  d.solution.forEach(text => {
    const m = text.match(/^([A-Za-z])/);
    if (!m) return;
    const key = m[1];
    if (!solutionMap[key]) solutionMap[key] = [];
    solutionMap[key].push(text);
  });

  let html = "";
  d.reason.forEach(r => {
    const m = r.match(/^([A-Za-z])/);
    const key = m ? m[1] : "";
    const sols = solutionMap[key] || [];
    html += `
      <div class="modal-pair">
        <div class="modal-pair-header">
          <span class="cause-label">${key || '?'}</span>
          <span>${r.replace(/^[A-Za-z]\./, '').trim()}</span>
        </div>
        ${sols.length ? `<ul class="modal-pair-solutions">${sols.map(s => `<li>${s}</li>`).join("")}</ul>` : ""}
      </div>
    `;
  });

  modalPairs.innerHTML = html;
  modal.classList.remove("hidden");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  modal.classList.add("hidden");
  document.body.style.overflow = "";
}

modal.addEventListener("click", e => { if (e.target === modal) closeModal(); });
closeBtn.addEventListener("click", closeModal);
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

function applyFilter() {
  const kw = keyword.trim().toLowerCase();
  const list = defects.filter(d => {
    let matchType = currentType === "all" ||
      (Array.isArray(d.type) ? d.type.includes(currentType) : d.type === currentType);
    const text = (d.name || "") + " " +
      (Array.isArray(d.reason) ? d.reason.join(" ") : "") + " " +
      (Array.isArray(d.solution) ? d.solution.join(" ") : "");
    const matchKeyword = !kw || text.toLowerCase().includes(kw);
    return matchType && matchKeyword;
  });
  renderCards(list);
}

document.querySelectorAll(".filter").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".filter").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentType = btn.dataset.type;
    applyFilter();
  };
});

const searchInput = document.getElementById("search-input");
if (searchInput) {
  searchInput.addEventListener("input", () => {
    keyword = searchInput.value;
    applyFilter();
  });
}

document.addEventListener("DOMContentLoaded", () => { applyFilter(); });
applyFilter();
// Auto-fill search from URL param ?q=
(function() {
  const q = new URLSearchParams(window.location.search).get('q');
  if (q && searchInput) { searchInput.value = q; keyword = q; applyFilter(); }
})();
</script>
</body>
</html>
