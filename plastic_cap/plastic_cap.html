<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>塑蓋異常快速查閱</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0a1628;
      --navy-mid: #112240;
      --navy-light: #1a3a5c;
      --accent: #e8a020;
      --accent-light: #f5bb4a;
      --accent-dim: rgba(232, 160, 32, 0.15);
      --white: #ffffff;
      --gray-100: #f0f2f5;
      --gray-200: #e2e6ec;
      --gray-400: #8a98ab;
      --gray-600: #4a5568;
      --danger: #e05252;
      --success: #38b28a;
      --card-shadow: 0 4px 20px rgba(0,0,0,0.08);
      --card-hover-shadow: 0 12px 40px rgba(0,0,0,0.15);
      --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
      background: var(--gray-100);
      color: var(--navy);
      min-height: 100vh;
    }

    /* ─── HEADER ─── */
    header {
      background: var(--navy);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.5rem 0.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .header-titles h1 {
      font-size: 1.35rem;
      font-weight: 900;
      color: var(--white);
      letter-spacing: 0.04em;
    }

    .header-titles h2 {
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--gray-400);
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    .header-badge {
      background: var(--accent);
      color: var(--navy);
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.25rem 0.7rem;
      border-radius: 99px;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    /* Search */
    .header-search {
      padding: 0.6rem 1.5rem;
    }

    .search-wrap {
      position: relative;
      max-width: 480px;
      margin: 0 auto;
    }

    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-400);
      font-size: 1rem;
      pointer-events: none;
    }

    #search-input {
      width: 100%;
      padding: 0.65rem 1rem 0.65rem 2.6rem;
      font-size: 0.9rem;
      font-family: inherit;
      border-radius: 999px;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.07);
      color: var(--white);
      outline: none;
      transition: border-color var(--transition), background var(--transition);
    }

    #search-input::placeholder { color: var(--gray-400); }
    #search-input:focus {
      border-color: var(--accent);
      background: rgba(255,255,255,0.11);
    }

    /* Filter Pills */
    .filter-scroll-wrap {
      overflow-x: auto;
      padding: 0.55rem 1rem 0.7rem;
      scrollbar-width: none;
    }
    .filter-scroll-wrap::-webkit-scrollbar { display: none; }

    #filters {
      display: flex;
      gap: 0.45rem;
      width: max-content;
    }

    .filter {
      padding: 0.38rem 0.9rem;
      font-size: 0.82rem;
      font-family: inherit;
      font-weight: 500;
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 99px;
      background: transparent;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      white-space: nowrap;
      transition: all var(--transition);
      letter-spacing: 0.02em;
    }

    .filter:hover {
      background: rgba(255,255,255,0.1);
      color: var(--white);
      border-color: rgba(255,255,255,0.3);
    }

    .filter.active {
      background: var(--accent);
      color: var(--navy);
      border-color: var(--accent);
      font-weight: 700;
    }

    /* Result count */
    .result-info {
      padding: 0.7rem 1.5rem 0.2rem;
      font-size: 0.78rem;
      color: var(--gray-600);
      letter-spacing: 0.02em;
    }

    /* ─── CARDS ─── */
    #card-container {
      padding: 0.8rem 1rem 3rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 0.8rem;
    }

    .card {
      background: var(--white);
      border-radius: 12px;
      padding: 0.7rem 0.6rem 0.8rem;
      cursor: pointer;
      text-align: center;
      box-shadow: var(--card-shadow);
      transition: transform var(--transition), box-shadow var(--transition);
      border: 1.5px solid transparent;
      animation: cardFadeIn 0.3s ease both;
      position: relative;
      overflow: hidden;
    }

    @keyframes cardFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
      transform: scaleX(0);
      transition: transform var(--transition);
      transform-origin: left;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--card-hover-shadow);
      border-color: var(--accent-light);
    }

    .card:hover::before { transform: scaleX(1); }

    .card img {
      width: 100%;
      height: 90px;
      object-fit: contain;
      border-radius: 6px;
      background: var(--gray-100);
      margin-bottom: 0.5rem;
    }

    .card-tag {
      display: inline-block;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 0.1rem 0.45rem;
      border-radius: 4px;
      margin-bottom: 0.3rem;
    }

    .card h3 {
      font-size: 0.88rem;
      font-weight: 700;
      line-height: 1.4;
      color: var(--navy);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Empty state */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--gray-400);
    }

    .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-state p { font-size: 0.95rem; }

    /* ─── MODAL ─── */
    #modal {
      position: fixed;
      inset: 0;
      background: rgba(5, 10, 20, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 9999;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    #modal.hidden { display: none !important; }

    .modal-content {
      background: var(--white);
      width: 100%;
      max-width: 600px;
      border-radius: 16px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
      animation: modalSlideUp 0.28s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes modalSlideUp {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-header {
      background: var(--navy);
      padding: 1.1rem 1.3rem;
      border-radius: 16px 16px 0 0;
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    #modal-title {
      font-size: 1.15rem;
      font-weight: 900;
      color: var(--white);
      letter-spacing: 0.04em;
    }

    #close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      color: var(--white);
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition);
      flex-shrink: 0;
      line-height: 1;
    }

    #close:hover { background: rgba(255,255,255,0.25); }

    .modal-img-wrap {
      padding: 1rem 1.3rem 0.5rem;
      background: var(--gray-100);
      border-bottom: 1px solid var(--gray-200);
    }

    #modal-img {
      width: 100%;
      max-height: 220px;
      object-fit: contain;
      border-radius: 8px;
      display: block;
    }

    .modal-body {
      padding: 0.8rem 1.3rem 1.5rem;
    }

    .modal-pair {
      margin-bottom: 0.9rem;
      border-radius: 10px;
      overflow: hidden;
      border: 1.5px solid var(--gray-200);
    }

    .modal-pair-header {
      background: var(--navy-mid);
      color: var(--white);
      font-weight: 700;
      font-size: 0.88rem;
      padding: 0.6rem 0.9rem;
      line-height: 1.5;
      display: flex;
      gap: 0.5rem;
      align-items: flex-start;
    }

    .cause-label {
      background: var(--accent);
      color: var(--navy);
      font-size: 0.72rem;
      font-weight: 900;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 1px;
      letter-spacing: 0.04em;
    }

    .modal-pair-solutions {
      list-style: none;
      padding: 0.5rem 0.9rem 0.6rem;
      margin: 0;
      background: #fafbfc;
    }

    .modal-pair-solutions li {
      font-size: 0.87rem;
      line-height: 1.65;
      color: var(--navy);
      padding: 0.3rem 0 0.3rem 1.2rem;
      position: relative;
      border-bottom: 1px solid var(--gray-100);
    }

    .modal-pair-solutions li:last-child { border-bottom: none; }

    .modal-pair-solutions li::before {
      content: '▶';
      position: absolute;
      left: 0;
      font-size: 0.55rem;
      color: var(--accent);
      top: 0.42rem;
    }

    /* scrollbar */
    .modal-content::-webkit-scrollbar { width: 4px; }
    .modal-content::-webkit-scrollbar-track { background: transparent; }
    .modal-content::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 99px; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 600px) {
      .header-top { padding: 0.75rem 1rem 0.4rem; }
      .header-titles h1 { font-size: 1.1rem; }
      .header-search { padding: 0.5rem 1rem; }
      .filter-scroll-wrap { padding: 0.45rem 0.8rem 0.6rem; }

      #card-container {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 0.65rem;
        padding: 0.7rem 0.8rem 3rem;
      }

      .card img { height: 75px; }
      .card h3 { font-size: 0.82rem; }

      .modal-content { max-height: 88vh; border-radius: 14px; }
      #modal-title { font-size: 1rem; }
      #modal-img { max-height: 160px; }
      .modal-header { padding: 0.85rem 1rem; border-radius: 14px 14px 0 0; }
      .modal-body { padding: 0.7rem 1rem 1.3rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-titles">
      <h1><a href="../index.html" style="color:inherit;text-decoration:none;">🔍 塑蓋異常快速查閱</a></h1>
      <h2>DEFECT QUICK REFERENCE SYSTEM</h2>
    </div>
    <span class="header-badge">2022 二版 &nbsp;|&nbsp; V1.0.0</span>
  </div>

  <div class="header-search">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="輸入關鍵字搜尋（名稱 / 原因 / 對策）">
    </div>
  </div>

  <div class="filter-scroll-wrap">
    <div id="filters">
     <button class="filter active" data-type="all">全部</button>
    <button class="filter" data-type="原料">原料</button>
    <button class="filter" data-type="射出">射出</button>
    <button class="filter" data-type="壓模">壓模</button>
    <button class="filter" data-type="整型">整型</button>
    <button class="filter" data-type="切割">切割</button>
    <button class="filter" data-type="印刷">印刷</button>
    <button class="filter" data-type="內墊">內墊</button>
    <button class="filter" data-type="組合">組合</button>
    <button class="filter" data-type="封蓋">封蓋</button>
    </div>
  </div>
</header>

<div class="result-info" id="result-info"></div>
<main id="card-container"></main>

<!-- Modal -->
<div id="modal" class="hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button id="close" aria-label="關閉">&times;</button>
    </div>
    <div class="modal-img-wrap">
      <img id="modal-img" alt="">
    </div>
    <div class="modal-body">
      <div id="modal-pairs"></div>
    </div>
  </div>
</div>

<script>
const defects = [
  {
    name: "蓋體溢料",
    type: "射出",
    img: "images/蓋體溢料.JPG",
    reason: [
      "A.劑量過多。(螺桿殘料量一般為2~3mm)  ",
      "B.射出壓力過大",
      "C.模具(公模模內芯)偏心"
    ],
    solution: [
      "A1.殘量過多則調降劑量 (減少計量終止位置)，若殘量正常則降壓力",
      "B1.降低射出壓力",
      "C1.重新校正模具","C2.更換公模模內芯新品"
    ]
  },
  {
    name: "反捲缺料",
    type: "射出",
    img: "images/反捲缺料.JPG",
    reason: [
      "A.射出壓力不足",
      "B.模具內部滲水，導致成型不良","C.模具單點射嘴阻塞"
    ],
    solution: [
      "A1.壓力表壓力顯示不足提高射出量 / 壓力",
      "B1.下模更換冷卻棒油封","C1.下模保養清潔模具"
    ]
  },
  {
    name: "強化環毛邊(射出)",
    type: "射出",
    img: "images/強化環毛邊(射出).JPG",
    reason: [
      "A.公母模合模間隙過大",
      "B.公模襯套 / 母模仁磨損"
    ],
    solution: [
      "A1.檢查公、母模有無異物",
      "B1.更換公模襯套 / 母模仁"
    ]
  },
  {
    name: "葉片毛邊(射出)",
    type: "射出",
    img: "images/葉片毛邊(射出).JPG",
    reason: [
      "A.模具單點溫度過高",
      "B.公模溫度過高",
      "C.保壓壓力過高",
      "D.公模磨損，導致射出成型不良"
    ],
    solution: [
      "A1.調整單模溫度",
      "B1.檢查模溫機設定與實際有無差異，如落差10℃以上須進行維修改善",
      "C1.降低射出壓力與速度 / 保壓壓力與速度",
      "D1.拆模進行維修保養"
    ]
  },
  {
    name: "注口未削平",
    type: "射出",
    img: "images/注口未削平.JPG",
    reason: [
      "A.刀座殘留塑膠粉屑",
      "B.壓板高度過高",
      "C.切削刀具鈍化",
      "D.刀座弧面不佳"
    ],
    solution: [
      "A1.清潔刀座",
      "A2.清潔真空濾網",
      "B1.調降壓板高度",
      "C1.拆卸刀具進行研磨處理",
      "C2.更換切削刀具新品",
      "D1.更換新刀座"
    ]
  },
  {
    name: "蓋體焦化",
    type: ["射出", "壓模"],
    img: "images/蓋體焦化.JPG",
    reason: [
      "A.料管中殘留老化料",
      "B.料管溫度過高",
      "C.蜂巢式混煉器殘料(壓模)",
      "D.螺桿表面受損，造成原料滯留(壓模)"
    ],
    solution: [
      "A1.清洗料管",
      "B1.降低料管溫度",
      "C1.清潔混煉器",
      "D1.檢查螺桿表面有無損傷"
    ]
  },
  {
    name: "蓋體黑點",
    type: ["射出", "壓模"],
    img: "images/蓋體黑點.JPG",
    reason: [
      "A.色母雜質污染，導致熔融壓出成型時產生",
      "B.料管中殘留老化料",
      "C.料管溫度過高"
    ],
    solution: [
      "A1.更換色母不同批號生產",
      "B1.清洗料管",
      "C1.降低料管溫度"
    ]
  },
  {
    name: "飛碟蓋",
    type: "壓模",
    img: "images/飛碟蓋.JPG",
    reason: [
      "A.投料位置偏移",
      "B.投料量過多",
      "C.油壓系統不穩，導致低壓流量過大產生溢料",
      "D.公、母模合模平整度不足",
      "E.母模柱背壓環損壞，導致油壓不足"
    ],
    solution: [
      "A1.確認投料位置偏移程度，並縮短 / 延長投料吹氣時間",
      "B1.確認異常品重量",
      "B2.調整投料壓出劑量",
      "C1.檢查高低壓力有無正常",
      "C2.查修保養油壓系統",
      "D1.檢查底模固定螺絲有無鬆動，必要時須重新固鎖",
      "D2.檢查母模墊片有無異物干擾，必要時須進行清潔排除",
      "E1.更換母模柱背壓環新品"
    ]
  },
  {
    name: "強化環毛邊(壓模)",
    type: "壓模",
    img: "images/強化環毛邊(壓模).JPG",
    reason: [
      "A.投料位置偏移",
      "B.油壓系統不穩，導致低壓流量過大產生溢料",
      "C.氮氣壓力異常",
      "D.模具受損 (撥脫環 / 母模座)，導致密合度不佳產生溢料毛邊",
      "E.刮刀磨損造成間隙過大刮料異常，成型後產生毛邊"
    ],
    solution: [
      "A1.重新調整投料位置",
      "B1.查修保養油壓系統及更換零件",
      "C1.確認氮氣壓力有無過高或過低之情形",
      "C2.更換氮氣皮囊 / 填充氮氣",
      "D1.更換撥脫環 / 母模座新品",
      "E1.更換刮刀新品"
    ]
  },
  {
    name: "葉片毛邊(壓模)",
    type: "壓模",
    img: "images/葉片毛邊(壓模).JPG",
    reason: [
      "A.模內芯與內襯套作動磨損，導致兩者間隙過大",
      "B.模內芯與內襯套卡異物造成作動不良"
    ],
    solution: [
      "A1.拆模檢查內襯套有無磨損",
      "A2.檢查量測模內芯與內襯套間隙 (約0.03mm)，若間隙不足 / 過大時，須重新調整模內芯墊片 / 更換模內芯 / 內襯套",
      "B1.公模拆模保養並進行中心校正定位"
    ]
  },
  {
    name: "凹蓋",
    type: "壓模",
    img: "images/凹蓋.JPG",
    reason: [
      "A.脫模風壓過小",
      "B.風管破裂 / 接頭破損，導致脫模風量不足",
      "C.公模固定蓋內油封破損",
      "D.模具作動不良",
      "E.冷卻水管阻塞，導致蓋體冷卻不良、脫模不易",
      "F.冷卻水溫度異常",
      "G.風壓調節閥異常",
      "H.水分配器耐磨環磨損"
    ],
    solution: [
      "A1.調降單模脫模風壓。(單模風量調整)",
      "A2.調升脫模總風壓。(總風壓調整)",

const container = document.getElementById("card-container");
const modal = document.getElementById("modal");
const modalTitle = document.getElementById("modal-title");
const modalImg = document.getElementById("modal-img");
const closeBtn = document.getElementById("close");
const modalPairs = document.getElementById("modal-pairs");
const resultInfo = document.getElementById("result-info");

let currentType = "all";
let keyword = "";

function getTypeLabel(type) {
  if (Array.isArray(type)) return type[0];
  return type;
}

function renderCards(list) {
  container.innerHTML = "";
  resultInfo.textContent = `共 ${list.length} 項異常`;

  if (list.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🔎</div><p>找不到符合條件的異常項目</p></div>`;
    return;
  }

  list.forEach((d, i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = `${Math.min(i * 0.03, 0.5)}s`;
    card.innerHTML = `
      <img src="${d.img}" alt="${d.name}" loading="lazy" onerror="this.style.display='none'">
      <div class="card-tag">${getTypeLabel(d.type)}</div>
      <h3>${d.name}</h3>
    `;
    card.onclick = () => openModal(d);
    container.appendChild(card);
  });
}

function openModal(d) {
  modalTitle.innerText = d.name;
  modalImg.src = d.img;
  modalImg.alt = d.name;

  const solutionMap = {};
  d.solution.forEach(text => {
    const m = text.match(/^([A-Za-z])/);
    if (!m) return;
    const key = m[1];
    if (!solutionMap[key]) solutionMap[key] = [];
    solutionMap[key].push(text);
  });

  let html = "";
  d.reason.forEach(r => {
    const m = r.match(/^([A-Za-z])/);
    const key = m ? m[1] : "";
    const sols = solutionMap[key] || [];
    html += `
      <div class="modal-pair">
        <div class="modal-pair-header">
          <span class="cause-label">${key || '?'}</span>
          <span>${r.replace(/^[A-Za-z]\./, '').trim()}</span>
        </div>
        ${sols.length ? `<ul class="modal-pair-solutions">${sols.map(s => `<li>${s}</li>`).join("")}</ul>` : ""}
      </div>
    `;
  });

  modalPairs.innerHTML = html;
  modal.classList.remove("hidden");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  modal.classList.add("hidden");
  document.body.style.overflow = "";
}

modal.addEventListener("click", e => { if (e.target === modal) closeModal(); });
closeBtn.addEventListener("click", closeModal);
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

function applyFilter() {
  const kw = keyword.trim().toLowerCase();
  const list = defects.filter(d => {
    let matchType = currentType === "all" ||
      (Array.isArray(d.type) ? d.type.includes(currentType) : d.type === currentType);
    const text = (d.name || "") + " " +
      (Array.isArray(d.reason) ? d.reason.join(" ") : "") + " " +
      (Array.isArray(d.solution) ? d.solution.join(" ") : "");
    const matchKeyword = !kw || text.toLowerCase().includes(kw);
    return matchType && matchKeyword;
  });
  renderCards(list);
}

document.querySelectorAll(".filter").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".filter").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentType = btn.dataset.type;
    applyFilter();
  };
});

const searchInput = document.getElementById("search-input");
if (searchInput) {
  searchInput.addEventListener("input", () => {
    keyword = searchInput.value;
    applyFilter();
  });
}

document.addEventListener("DOMContentLoaded", () => { applyFilter(); });
applyFilter();
(function() {
  const q = new URLSearchParams(window.location.search).get('q');
  if (q && searchInput) { searchInput.value = q; keyword = q; applyFilter(); }
})();
</script>
